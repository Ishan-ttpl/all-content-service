name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback, e.g., deploy-tn-staging-v1.0.0)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: tn-staging

    steps:
      - name: Debug workflow inputs
        run: |
          echo "Workflow inputs:"
          echo "action: ${{ github.event.inputs.action }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"
          echo "environment: ${{ job.environment }}"
          echo "runner: $RUNNER_OS, $RUNNER_NAME"
          echo "event_name: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"

      - name: Determine action
        id: vars
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/deploy-tn-staging-* ]]; then
            ACTION="deploy"
          fi
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Validate inputs
        run: |
          if [[ "${{ steps.vars.outputs.action }}" != "deploy" && "${{ steps.vars.outputs.action }}" != "rollback" ]]; then
            echo "::error::Invalid action: ${{ steps.vars.outputs.action }}"
            exit 1
          fi
          if [[ "${{ steps.vars.outputs.action }}" == "rollback" && -z "${{ github.event.inputs.rollback_tag }}" ]]; then
            echo "::error::Rollback tag is required for rollback action"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Validate secrets
        run: |
          missing_secrets=""
          [[ -z "${{ secrets.SSH_KEY }}" ]] && missing_secrets="$missing_secrets SSH_KEY"
          [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets="$missing_secrets TN_STAGING_HOST"
          [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets="$missing_secrets JUMPHOST"
          [[ -z "${{ secrets.ENV_FILE }}" ]] && missing_secrets="$missing_secrets ENV_FILE"
          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for tn-staging:$missing_secrets"
            exit 1
          fi
          invalid_hosts=""
          [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_STAGING_HOST"
          [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts JUMPHOST"
          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid format for hosts (expected user@host) for tn-staging:$invalid_hosts"
            exit 1
          fi

      - name: Set up SSH keys and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ls -l /tmp/id_rsa  # Debug: Verify file exists
          ssh-keygen -l -f /tmp/id_rsa  # Debug: Show key fingerprint
          TN_STAGING_HOST="${{ secrets.TN_STAGING_HOST }}"
          JUMPHOST="${{ secrets.JUMPHOST }}"
          HOSTNAME="${TN_STAGING_HOST##*@}"
          USER="${TN_STAGING_HOST%%@*}"
          JUMPHOST_USER="${JUMPHOST%%@*}"
          JUMPHOST_HOST="${JUMPHOST##*@}"
          echo -e "Host jumphost\n  HostName $JUMPHOST_HOST\n  User $JUMPHOST_USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\nHost staging\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > /tmp/ssh_config
          chmod 600 /tmp/ssh_config
          ls -l /tmp/ssh_config  # Debug: Verify file exists
          cat /tmp/ssh_config  # Debug: Verify config
          # Populate known_hosts for reliability
          ssh-keyscan -H $JUMPHOST_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts 2>/dev/null || true
          cat ~/.ssh/known_hosts  # Debug: Show known_hosts

      - name: Test jump host connectivity
        run: |
          ssh -vvv -F /tmp/ssh_config jumphost "echo 'Jump host connection successful'" || { echo "::error::Jump host connection failed"; cat /tmp/ssh_config; exit 1; }

      - name: Test target host connectivity
        run: |
          ssh -vvv -F /tmp/ssh_config staging "echo 'Target host connection successful'" || { echo "::error::Target host connection failed"; cat /tmp/ssh_config; exit 1; }

      - name: Set target directory
        run: |
          echo "target_dir=/home/all-staging-user/all-services/all-content-deploy" >> $GITHUB_ENV

      - name: Create and transfer .env file
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          echo "${{ secrets.ENV_FILE }}" > .env
          chmod 600 .env
          ls -l .env  # Debug: Verify .env exists
          rsync -avz -e "ssh -vvv -F /tmp/ssh_config" .env staging:$TARGET_DIR/.env || { echo "::error::Failed to rsync .env file"; cat /tmp/ssh_config; exit 1; }
          ssh -F /tmp/ssh_config staging "ls -l $TARGET_DIR/.env" || { echo "::error::Failed to verify .env on target server"; exit 1; }
          rm -f .env

      - name: Deploy or rollback
        run: |
          ACTION="${{ steps.vars.outputs.action }}"
          TARGET_DIR="${{ env.target_dir }}"
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          rsync -avz -e "ssh -F /tmp/ssh_config" deploy.sh staging:/home/all-staging-user/deploy.sh || { echo "::error::Failed to rsync deploy.sh"; exit 1; }
          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to tn-staging"
            ssh -F /tmp/ssh_config staging "chmod +x /home/all-staging-user/deploy.sh && cd $TARGET_DIR && \
              git fetch --all && \
              git checkout $BRANCH || { echo 'Failed to checkout $BRANCH, falling back to lais-v2.0'; git checkout lais-v2.0; } && \
              git reset --hard origin/$BRANCH && \
              git clean -fd && \
              git pull origin $BRANCH || { echo 'Failed to pull $BRANCH, pulling lais-v2.0'; git pull origin lais-v2.0; } && \
              /bin/bash /home/all-staging-user/deploy.sh $TARGET_DIR $BRANCH deploy"
          elif [[ "$ACTION" == "rollback" ]]; then
            echo "Rolling back to tag $ROLLBACK_TAG on tn-staging"
            ssh -F /tmp/ssh_config staging "chmod +x /home/all-staging-user/deploy.sh && cd $TARGET_DIR && \
              git fetch --all --tags && \
              git checkout tags/$ROLLBACK_TAG || { echo 'Failed to checkout tag $ROLLBACK_TAG'; exit 1; } && \
              git reset --hard tags/$ROLLBACK_TAG && \
              git clean -fd && \
              /bin/bash /home/all-staging-user/deploy.sh $TARGET_DIR $ROLLBACK_TAG rollback"
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

      - name: Verify container logs
        run: |
          ssh -F /tmp/ssh_config staging "docker logs content-service || echo 'Failed to get container logs'"

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f /tmp/id_rsa /tmp/ssh_config .env
