name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy or rollback'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, rollback]
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options: [test-rig-dev, test-rig-prod, tn-dev, tn-staging]
      branch:
        description: 'Branch to deploy (for deploy only)'
        required: false
        default: 'main'
        type: string
      rollback_tag:
        description: 'Tag to rollback to (for rollback only)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: Ishan-ttpl/all-content-service
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || github.ref_name }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync dos2unix

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.SSH_KEY }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Write SSH config for jumphost and target
        run: |
          mkdir -p ~/.ssh
          echo "Host jumphost
            HostName ${JUMPHOST#*@}
            User ${JUMPHOST%@*}
            IdentityFile $PWD/key.pem
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null" >> ~/.ssh/config
          echo "Host target
            HostName ${TN_STAGING_HOST#*@}
            User ${TN_STAGING_HOST%@*}
            IdentityFile $PWD/key.pem
            ProxyJump jumphost
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null" >> ~/.ssh/config
        env:
          JUMPHOST: ${{ secrets.JUMPHOST }}
          TN_STAGING_HOST: ${{ secrets.TN_STAGING_HOST }}

      - name: Add known hosts
        run: |
          ssh-keyscan "${JUMPHOST#*@}" >> ~/.ssh/known_hosts || true
          ssh-keyscan "${TN_STAGING_HOST#*@}" >> ~/.ssh/known_hosts || true
        env:
          JUMPHOST: ${{ secrets.JUMPHOST }}
          TN_STAGING_HOST: ${{ secrets.TN_STAGING_HOST }}

      - name: Prepare deploy.sh
        run: |
          mkdir -p scripts/
          echo "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" | base64 -d > scripts/deploy.sh
          chmod +x scripts/deploy.sh
          dos2unix scripts/deploy.sh

      - name: Prepare docker-compose.yml
        run: |
          echo "${{ secrets.DOCKER_COMPOSE_CONTENT }}" | base64 -d > docker-compose.yml
          dos2unix docker-compose.yml

      - name: Prepare .env file (if secret exists)
        run: |
          if [ -n "${{ secrets.ENV_FILE }}" ]; then
            echo "${{ secrets.ENV_FILE }}" | base64 -d > .env
            chmod 600 .env
            cat .env
          else
            echo "No ENV_FILE secret provided. Skipping .env creation."
          fi

      - name: Transfer files to remote server
        run: |
          TARGET_DIR="/home/deployment/all-services/all-content-service"
          rsync -avz -e "ssh -F ~/.ssh/config" scripts/deploy.sh target:"$TARGET_DIR/scripts/"
          rsync -avz -e "ssh -F ~/.ssh/config" docker-compose.yml target:"$TARGET_DIR/docker-compose.yml"
          if [ -f .env ]; then
            rsync -avz -e "ssh -F ~/.ssh/config" .env target:"$TARGET_DIR/.env"
            ssh -F ~/.ssh/config target "ls -l $TARGET_DIR/.env && cat $TARGET_DIR/.env"
          else
            ssh -F ~/.ssh/config target "rm -f $TARGET_DIR/.env || true"
          fi

      - name: Run remote deploy script
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "$ACTION" == "rollback" ]; then
            REF="${{ github.event.inputs.rollback_tag }}"
          else
            REF="${{ github.event.inputs.branch }}"
          fi
          if [ -z "$REF" ]; then
            echo "::error::No branch or rollback_tag provided"
            exit 1
          fi
          ssh -F ~/.ssh/config target <<EOF
            set -e
            cd /home/deployment/all-services/all-content-service
            export DOCKER_COMPOSE_CONTENT_B64='${{ secrets.DOCKER_COMPOSE_CONTENT }}'
            export ENV_FILE_B64='${{ secrets.ENV_FILE }}'
            sudo bash scripts/deploy.sh "\$PWD" "$REF" "$ACTION"
          EOF

      - name: Verify container logs
        run: |
          ssh -F ~/.ssh/config target "docker logs content-service || echo 'Failed to get container logs'"

      - name: Notify Slack — Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deployment of *All-Content-Service* to *${{ github.event.inputs.environment }}* completed successfully.\nRef: `${{ github.event.inputs.branch || github.event.inputs.rollback_tag }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack — Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deployment of *All-Content-Service* to *${{ github.event.inputs.environment }}* failed.\nRef: `${{ github.event.inputs.branch || github.event.inputs.rollback_tag }}`\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f key.pem .env docker-compose.yml
          rm -rf scripts/
