name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Determine environment and action
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PREFIX="${GITHUB_REF#refs/tags/deploy-}"
            case "$TAG_PREFIX" in
              test-rig-dev*) ENVIRONMENT="test-rig-dev" ;;
              test-rig-prod*) ENVIRONMENT="test-rig-prod" ;;
              tn-dev*) ENVIRONMENT="tn-dev" ;;
              tn-staging*) ENVIRONMENT="tn-staging" ;;
              *) echo "::error::Invalid tag format"; exit 1 ;;
            esac
            ACTION="deploy"
          else
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
          fi
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "action=$ACTION" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify repository structure
        run: |
          ls -la
          [ ! -f "deploy.sh" ] && { echo "::error::deploy.sh not found"; exit 1; }
          [ ! -f "docker-compose.yml" ] && { echo "::error::docker-compose.yml not found"; exit 1; }

      - name: Setup SSH config and determine host
        id: ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh-keygen -y -f /tmp/id_rsa > /tmp/id_rsa.pub

          ENV="${{ steps.vars.outputs.environment }}"
          case "$ENV" in
            test-rig-dev)
              HOST="${{ secrets.TEST_RIG_DEV_HOST }}"
              TARGET_DIR="/home/sudeepr/git/all-content-service"
              ;;
            test-rig-prod)
              HOST="${{ secrets.TEST_RIG_PROD_HOST }}"
              TARGET_DIR="/home/sudeepr/all-services/all-content-service"
              ;;
            tn-dev)
              HOST="${{ secrets.TN_DEV_HOST }}"
              TARGET_DIR="/home/alldevuser/git/all-content-service"
              ;;
            tn-staging)
              HOST="${{ secrets.TN_STAGING_HOST }}"
              JUMPHOST="${{ secrets.JUMPHOST }}"
              TARGET_DIR="/home/deployment/all-services/all-content-service"
              ;;
            *)
              echo "::error::Unknown environment"; exit 1 ;;
          esac

          USER="${HOST%%@*}"
          HOSTNAME="${HOST##*@}"

          if [[ "$ENV" == "tn-staging" ]]; then
            JUMPHOST_USER="${JUMPHOST%%@*}"
            JUMPHOST_HOST="${JUMPHOST##*@}"
            echo "Host jumphost"           >  /tmp/ssh_config
            echo "  HostName $JUMPHOST_HOST" >> /tmp/ssh_config
            echo "  User $JUMPHOST_USER"     >> /tmp/ssh_config
            echo "  IdentityFile /tmp/id_rsa" >> /tmp/ssh_config
            echo "  StrictHostKeyChecking no" >> /tmp/ssh_config
            echo "Host target"              >> /tmp/ssh_config
            echo "  HostName $HOSTNAME"     >> /tmp/ssh_config
            echo "  User $USER"             >> /tmp/ssh_config
            echo "  IdentityFile /tmp/id_rsa" >> /tmp/ssh_config
            echo "  ProxyJump jumphost"     >> /tmp/ssh_config
            echo "  StrictHostKeyChecking no" >> /tmp/ssh_config
          else
            echo "Host target"             >  /tmp/ssh_config
            echo "  HostName $HOSTNAME"    >> /tmp/ssh_config
            echo "  User $USER"            >> /tmp/ssh_config
            echo "  IdentityFile /tmp/id_rsa" >> /tmp/ssh_config
            echo "  StrictHostKeyChecking no" >> /tmp/ssh_config
          fi

          chmod 600 /tmp/ssh_config

          echo "target_dir=$TARGET_DIR" >> $GITHUB_ENV
          echo "remote_user=$USER" >> $GITHUB_ENV

      - name: Transfer files
        run: |
          for file in deploy.sh docker-compose.yml; do
            echo "Transferring $file..."
            rsync -avz -e "ssh -F /tmp/ssh_config" $file target:${{ env.target_dir }}/ || {
              echo "::error::Failed to transfer $file"; exit 1
            }
          done

      - name: Deploy or Rollback
        run: |
          ACTION="${{ steps.vars.outputs.action }}"
          DIR="${{ env.target_dir }}"

          if [[ "$ACTION" == "deploy" ]]; then
            BRANCH="${{ github.event.inputs.branch }}"
            [[ -z "$BRANCH" ]] && BRANCH="${{ github.ref_name }}"
            echo "Deploying branch: $BRANCH"
            ssh -F /tmp/ssh_config target "cd $DIR && chmod +x deploy.sh && ./deploy.sh \"$DIR\" \"$BRANCH\" deploy" || {
              echo "::error::Deployment failed"; exit 1;
            }
          elif [[ "$ACTION" == "rollback" ]]; then
            TAG="${{ github.event.inputs.rollback_tag }}"
            [ -z "$TAG" ] && { echo "::error::Rollback tag required"; exit 1; }
            echo "Rolling back to tag: $TAG"
            ssh -F /tmp/ssh_config target "cd $DIR && chmod +x deploy.sh && ./deploy.sh \"$DIR\" \"$TAG\" rollback" || {
              echo "::error::Rollback failed"; exit 1;
            }
          else
            echo "::error::Invalid action"; exit 1;
          fi

      - name: Verify deployment
        run: |
          ssh -F /tmp/ssh_config target "
            docker ps --filter name=content-service
            docker logs content-service --tail 20
          " || { echo "::error::Verification failed"; exit 1; }

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo ":white_check_mark:" || echo ":x:")
          TEXT="$ICON Deployment $STATUS for all-content-service\nEnvironment: ${{ steps.vars.outputs.environment }}\nAction: ${{ steps.vars.outputs.action }}\nRef: ${{ github.ref_name }}"
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\": \"$TEXT\"}" "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/id_rsa /tmp/ssh_config /tmp/id_rsa.pub
