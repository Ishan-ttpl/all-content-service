name: Content Service Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deploy or Rollback'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      branch:
        description: 'Branch to deploy (for deploy action)'
        required: false
        default: 'main'
      tag:
        description: 'Tag to rollback to (for rollback action)'
        required: false
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: ${{ inputs.environment }}

    steps:
      - name: Print Inputs
        run: |
          echo "Action: ${{ inputs.action }}"
          echo "Branch: ${{ inputs.branch }}"
          echo "Tag: ${{ inputs.tag }}"
          echo "Environment: ${{ inputs.environment }}"

      - name: Validate Secrets
        run: |
          echo "=== Validating Required Secrets ==="
          missing_secrets=""
          
          # Required for all environments
          required_secrets=("SSH_KEY" "ENV_FILE" "DEPLOY_SCRIPT" "DOCKER_COMPOSE")
          for secret in "${required_secrets[@]}"; do
            if [ -z "${{ secrets[secret] }}" ]; then
              missing_secrets+=" $secret"
            fi
          done
          
          # Environment-specific secrets
          case "${{ inputs.environment }}" in
            tn-staging)
              required_secrets+=("TN_STAGING_HOST" "JUMPHOST" "SLACK_WEBHOOK_URL")
              ;;
            tn-dev)
              required_secrets+=("TN_DEV_HOST")
              ;;
            test-rig-dev)
              required_secrets+=("TEST_RIG_DEV_HOST")
              ;;
            test-rig-prod)
              required_secrets+=("TEST_RIG_PROD_HOST")
              ;;
          esac
          
          for secret in "${required_secrets[@]}"; do
            if [ -z "${{ secrets[secret] }}" ]; then
              missing_secrets+=" $secret"
            fi
          done
          
          if [ -n "$missing_secrets" ]; then
            echo "::error::Missing required secrets:$missing_secrets"
            exit 1
          fi
          
          echo "All required secrets are present"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.action == 'deploy' && inputs.branch || inputs.tag }}
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          
          # Configure based on environment
          case "${{ inputs.environment }}" in
            tn-staging)
              echo "Configuring for tn-staging"
              HOST="${{ secrets.TN_STAGING_HOST }}"
              JUMPHOST="${{ secrets.JUMPHOST }}"
              TARGET_DIR="/home/deployment/all-services/all-content-service"
              
              # Create SSH config with jump host
              cat <<EOF > /tmp/ssh_config
Host jumphost
  HostName ${JUMPHOST#*@}
  User ${JUMPHOST%@*}
  IdentityFile /tmp/id_rsa
  StrictHostKeyChecking no
Host target
  HostName ${HOST#*@}
  User ${HOST%@*}
  IdentityFile /tmp/id_rsa
  ProxyJump jumphost
  StrictHostKeyChecking no
EOF
              ;;
            *)
              echo "Configuring for ${{ inputs.environment }}"
              HOST="${{ secrets.TN_DEV_HOST }}"
              TARGET_DIR="/home/alldevuser/git/all-content-service"
              
              # Create direct SSH config
              cat <<EOF > /tmp/ssh_config
Host target
  HostName ${HOST#*@}
  User ${HOST%@*}
  IdentityFile /tmp/id_rsa
  StrictHostKeyChecking no
EOF
              ;;
          esac
          
          chmod 600 /tmp/ssh_config
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

      - name: Prepare Deployment Files
        run: |
          echo "=== Preparing Deployment Files ==="
          echo "${{ secrets.DEPLOY_SCRIPT }}" > deploy.sh
          echo "${{ secrets.DOCKER_COMPOSE }}" > docker-compose.yml
          echo "${{ secrets.ENV_FILE }}" > .env
          
          chmod +x deploy.sh
          dos2unix deploy.sh docker-compose.yml .env
          
          echo "--- deploy.sh (first 10 lines) ---"
          head -n 10 deploy.sh
          echo "--- docker-compose.yml ---"
          cat docker-compose.yml
          echo "--- .env (redacted) ---"
          head -n 3 .env
          echo "... [rest redacted]"

      - name: Transfer Files
        run: |
          echo "=== Transferring Files to Target ==="
          for file in deploy.sh docker-compose.yml .env; do
            echo "Transferring $file to $TARGET_DIR/"
            rsync -avz -e "ssh -F /tmp/ssh_config" $file target:$TARGET_DIR/ || {
              echo "::error::Failed to transfer $file"
              exit 1
            }
          done

      - name: Execute Deployment
        run: |
          echo "=== Executing Deployment ==="
          COMMAND="cd $TARGET_DIR && chmod +x deploy.sh && ./deploy.sh \"$TARGET_DIR\" "
          
          if [[ "${{ inputs.action }}" == "deploy" ]]; then
            COMMAND+="\"${{ inputs.branch }}\" deploy"
          else
            [ -z "${{ inputs.tag }}" ] && { echo "::error::Rollback tag required"; exit 1; }
            COMMAND+="\"${{ inputs.tag }}\" rollback"
          fi
          
          echo "Executing: $COMMAND"
          ssh -F /tmp/ssh_config target "$COMMAND" || {
            echo "::error::Deployment failed"
            exit 1
          }

      - name: Verify Deployment
        run: |
          echo "=== Verifying Deployment ==="
          ssh -F /tmp/ssh_config target "
            echo 'Running containers:'
            docker ps -a
            echo 'Content service logs:'
            docker logs content-service --tail 50
          " || {
            echo "::error::Verification failed"
            exit 1
          }

      - name: Notify Slack
        if: always()
        run: |
          echo "=== Sending Slack Notification ==="
          STATUS="${{ job.status == 'success' && 'SUCCESS' || 'FAILURE' }}"
          MESSAGE="*Content Service Deployment $STATUS*\n*Environment:* ${{ inputs.environment }}\n*Action:* ${{ inputs.action }}"
          
          if [[ "${{ inputs.action }}" == "deploy" ]]; then
            MESSAGE+="\n*Branch:* ${{ inputs.branch }}"
          else
            MESSAGE+="\n*Tag:* ${{ inputs.tag }}"
          fi
          
          MESSAGE+="\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Cleanup
        if: always()
        run: |
          echo "=== Cleaning Up ==="
          rm -f /tmp/id_rsa /tmp/ssh_config deploy.sh docker-compose.yml .env
