name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'tn-staging' }}

    steps:
      - name: Determine environment and action
        id: vars
        run: |
          ENVIRONMENT="tn-staging"
          ACTION="${{ github.event.inputs.action || 'deploy' }}"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Debug workflow inputs
        run: |
          echo "action: ${{ github.event.inputs.action }}"
          echo "environment: ${{ steps.vars.outputs.environment }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write deploy.sh and docker-compose.yml from secrets
        run: |
          echo "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" | base64 -d > deploy.sh
          echo "${{ secrets.DOCKER_COMPOSE_CONTENT }}" | base64 -d > docker-compose.yml
          chmod +x deploy.sh
          ls -l deploy.sh docker-compose.yml
          cat deploy.sh
          cat docker-compose.yml

      - name: Install rsync and dos2unix
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync dos2unix

      - name: Validate secrets
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          missing_secrets=""
          invalid_hosts=""
          [[ -z "${{ secrets.SSH_KEY }}" ]] && missing_secrets="$missing_secrets SSH_KEY"
          [[ -z "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" ]] && missing_secrets="$missing_secrets DEPLOY_SCRIPT_CONTENT"
          [[ -z "${{ secrets.DOCKER_COMPOSE_CONTENT }}" ]] && missing_secrets="$missing_secrets DOCKER_COMPOSE_CONTENT"
          [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets="$missing_secrets TN_STAGING_HOST"
          [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets="$missing_secrets JUMPHOST"
          [[ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]] && missing_secrets="$missing_secrets SLACK_WEBHOOK_URL"
          [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_STAGING_HOST"
          [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts JUMPHOST"
          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for $ENVIRONMENT:$missing_secrets"
            exit 1
          fi
          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid host format (expected user@host) for $ENVIRONMENT:$invalid_hosts"
            exit 1
          fi

      - name: Generate and store public key
        run: |
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh-keygen -y -f /tmp/id_rsa > /tmp/id_rsa.pub
          echo "public_key=$(cat /tmp/id_rsa.pub)" >> "$GITHUB_ENV"

      - name: Set up SSH keys and config
        run: |
          mkdir -p ~/.ssh
          chmod 600 /tmp/id_rsa
          HOST="${{ secrets.TN_STAGING_HOST }}"
          JUMPHOST="${{ secrets.JUMPHOST }}"
          TARGET_DIR="/home/deployment/all-services/all-content-service"
          USER="${HOST%%@*}"
          HOSTNAME="${HOST##*@}"
          JUMPHOST_USER="${JUMPHOST%%@*}"
          JUMPHOST_HOST="${JUMPHOST##*@}"
          echo -e "Host jumphost\n  HostName $JUMPHOST_HOST\n  User $JUMPHOST_USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\nHost target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > /tmp/ssh_config
          chmod 600 /tmp/ssh_config
          cat /tmp/ssh_config
          echo "remote_user=$USER" >> "$GITHUB_ENV"
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_ENV"
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H $JUMPHOST_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Setup SSH key on target
        run: |
          ssh -F /tmp/ssh_config target "mkdir -p ~/.ssh && chmod 700 ~/.ssh"
          echo "${{ env.public_key }}" > /tmp/id_rsa.pub
          rsync -avz -e "ssh -F /tmp/ssh_config" /tmp/id_rsa.pub target:~/.ssh/id_rsa.pub
          ssh -F /tmp/ssh_config target "cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys"

      - name: Test host connectivity
        run: |
          ssh -F /tmp/ssh_config jumphost "echo 'Jump host connection successful'"
          ssh -F /tmp/ssh_config target "echo 'Target host connection successful'"

      - name: Create and transfer .env file
        if: "${{ secrets.ENV_FILE }}"
        run: |
          echo "${{ secrets.ENV_FILE }}" | base64 -d > .env
          chmod 600 .env
          rsync -avz -e "ssh -F /tmp/ssh_config" .env target:$TARGET_DIR/.env
          ssh -F /tmp/ssh_config target "ls -l $TARGET_DIR/.env"

      - name: Transfer deploy.sh and docker-compose.yml
        run: |
          dos2unix deploy.sh docker-compose.yml
          mkdir -p $TARGET_DIR/scripts $TARGET_DIR/docker
          rsync -avz -e "ssh -F /tmp/ssh_config" deploy.sh target:$TARGET_DIR/scripts/deploy.sh
          rsync -avz -e "ssh -F /tmp/ssh_config" docker-compose.yml target:$TARGET_DIR/docker-compose.yml
          ssh -F /tmp/ssh_config target "ls -la $TARGET_DIR $TARGET_DIR/docker/"

      - name: Deploy or rollback
        run: |
          ACTION="${{ steps.vars.outputs.action }}"
          if [[ "$ACTION" == "deploy" ]]; then
            BRANCH="${{ github.event.inputs.branch || 'lais-v2.0' }}"
            ssh -F /tmp/ssh_config target "chmod +x $TARGET_DIR/scripts/deploy.sh && $TARGET_DIR/scripts/deploy.sh $TARGET_DIR $BRANCH deploy && docker ps -a && docker logs content-service || echo 'No logs available'"
          elif [[ "$ACTION" == "rollback" ]]; then
            ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
            [[ -z "$ROLLBACK_TAG" ]] && { echo "::error::Rollback tag required"; exit 1; }
            ssh -F /tmp/ssh_config target "chmod +x $TARGET_DIR/scripts/deploy.sh && $TARGET_DIR/scripts/deploy.sh $TARGET_DIR $ROLLBACK_TAG rollback && docker ps -a && docker logs content-service || echo 'No logs available'"
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && 'Succeeded' || 'Failed' }}"
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"Deployment $STATUS for all-content-service\n*Environment:* tn-staging\n*Action:* ${{ github.event.inputs.action }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f /tmp/id_rsa /tmp/ssh_config .env /tmp/id_rsa.pub deploy.sh docker-compose.yml
