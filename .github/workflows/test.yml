name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy or rollback'
        required: true
        type: choice
        options: [deploy, rollback]
        default: deploy
      branch:
        description: 'Branch or tag'
        required: false
        default: main
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [tn-staging]
        default: tn-staging

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync dos2unix

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_KEY }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Transfer deploy.sh and compose
        run: |
          set -euxo pipefail
          # Pull the raw secret into a shell var
          RAW_HOST="${{ secrets.TN_STAGING_HOST }}"
          # Now do the user/host split in shell
          USER="${RAW_HOST%@*}"
          HOST="${RAW_HOST#*@}"
          TARGET_DIR=/home/deployment/all-services/all-content-service

          # rsync using the key and disabling host checks
          RSYNC_SSH="ssh -i key.pem -oStrictHostKeyChecking=no"

          rsync -az -e "$RSYNC_SSH" deploy.sh    $USER@"$HOST":"$TARGET_DIR"/deploy.sh
          rsync -az -e "$RSYNC_SSH" docker-compose.yml $USER@"$HOST":"$TARGET_DIR"/docker-compose.yml

          if [[ -f .env ]]; then
            rsync -az -e "$RSYNC_SSH" .env $USER@"$HOST":"$TARGET_DIR"/.env
          fi

      - name: Execute remote deploy.sh
        run: |
          HOST="${{ secrets.TN_STAGING_HOST#*@ }}"
          USER="${{ secrets.TN_STAGING_HOST%@* }}"
          TARGET_DIR=/home/deployment/all-services/all-content-service
          ACTION="${{ github.event.inputs.action }}"
          REF="${{ github.event.inputs.branch }}"

          ssh -i key.pem -oStrictHostKeyChecking=no $USER@"$HOST" <<EOF
            set -euo pipefail
            cd $TARGET_DIR
            sudo bash deploy.sh "\$PWD" "$REF" "$ACTION"
              EOF

      - name: Verify container status
        run: |
          HOST="${{ secrets.TN_STAGING_HOST#*@ }}"
          USER="${{ secrets.TN_STAGING_HOST%@* }}"
          ssh -i key.pem -oStrictHostKeyChecking=no $USER@"$HOST" \
            "docker ps --filter name=content-service --format '{{.Status}}' | grep -q Up"

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: >
            {
              "text": ":${{ job.status == 'success' && 'white_check_mark' || 'x' }}: *${{ github.event.inputs.action }}* on *${{ github.event.inputs.branch }}* — *${{ job.status }}*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
