name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy or rollback'
        required: true
        type: choice
        options: [deploy, rollback]
        default: deploy
      branch:
        description: 'Branch or tag'
        required: false
        default: main
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [tn-staging]
        default: tn-staging

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Install SSH & rsync
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync dos2unix

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_KEY }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Transfer deploy.sh and compose.yml
        env:
          RAW_HOST: ${{ secrets.TN_STAGING_HOST }}
        run: |
          set -euxo pipefail
          # Split user@host
          USER="${RAW_HOST%@*}"
          HOST="${RAW_HOST#*@}"
          TARGET_DIR=/home/deployment/all-services/all-content-service
          SSH_OPTS="-i key.pem -o StrictHostKeyChecking=no"

          rsync -az -e "ssh $SSH_OPTS" deploy.sh    "$USER@$HOST:$TARGET_DIR/deploy.sh"
          rsync -az -e "ssh $SSH_OPTS" docker-compose.yml "$USER@$HOST:$TARGET_DIR/docker-compose.yml"
          if [[ -f .env ]]; then
            rsync -az -e "ssh $SSH_OPTS" .env "$USER@$HOST:$TARGET_DIR/.env"
          fi

      - name: Execute remote deploy.sh
        env:
          RAW_HOST: ${{ secrets.TN_STAGING_HOST }}
        run: |
          set -euxo pipefail
          USER="${RAW_HOST%@*}"
          HOST="${RAW_HOST#*@}"
          TARGET_DIR=/home/deployment/all-services/all-content-service
          ACTION="${{ github.event.inputs.action }}"
          REF="${{ github.event.inputs.branch }}"

          ssh -i key.pem -o StrictHostKeyChecking=no "$USER@$HOST" <<'EOF'
            set -euo pipefail
            cd /home/deployment/all-services/all-content-service
            sudo bash deploy.sh "$PWD" "'"$REF"'" "'"$ACTION"'"
          EOF

      - name: Verify container status
        env:
          RAW_HOST: ${{ secrets.TN_STAGING_HOST }}
        run: |
          set -euxo pipefail
          USER="${RAW_HOST%@*}"
          HOST="${RAW_HOST#*@}"
          ssh -i key.pem -o StrictHostKeyChecking=no "$USER@$HOST" \
            "docker ps --filter name=content-service --format '{{.Status}}' | grep -q Up"

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ":${{ job.status == 'success' && 'white_check_mark' || 'x' }}: *${{ github.event.inputs.action }}* on *${{ github.event.inputs.branch }}* — *${{ job.status }}*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
