name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to staging server
    runs-on: ubuntu-latest
    environment: tn-staging  # 👈 Required to access environment secrets
    env:
      RAW_HOST: ${{ secrets.TN_STAGING_HOST }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up SSH key and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host staging
            HostName 10.3.0.9
            User deployment
            IdentityFile ~/.ssh/id_rsa
            ProxyJump sudeepr@4.240.49.92
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF

          chmod 600 ~/.ssh/config

      - name: Create deploy.sh
        run: |
          echo "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" > deploy.sh
          chmod +x deploy.sh

      - name: Create docker-compose.yml
        run: |
          echo "${{ secrets.DOCKER_COMPOSE_CONTENT }}" > docker-compose.yml

      - name: Create .env file (if set)
        if: ${{ secrets.ENV_FILE != '' }}
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Deploy to staging via rsync
        run: |
          set -euxo pipefail

          : "${RAW_HOST:?Environment variable RAW_HOST is required}"

          USER="${RAW_HOST%@*}"
          HOST="${RAW_HOST#*@}"
          TARGET_DIR=/home/deployment/all-services/all-content-service

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -J sudeepr@4.240.49.92 -i ~/.ssh/id_rsa"

          rsync -az -e "ssh $SSH_OPTS" deploy.sh "$USER@$HOST:$TARGET_DIR/deploy.sh"
          rsync -az -e "ssh $SSH_OPTS" docker-compose.yml "$USER@$HOST:$TARGET_DIR/docker-compose.yml"

          if [[ -f .env ]]; then
            rsync -az -e "ssh $SSH_OPTS" .env "$USER@$HOST:$TARGET_DIR/.env"
          fi
