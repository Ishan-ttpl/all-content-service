name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
        type: string
      rollback_tag:
        description: 'Tag to rollback to (only for rollback, e.g., deploy-tn-staging-v1.0.0)'
        required: false
        type: string

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'tn-staging' }}
    steps:
      - name: Determine environment and action
        id: vars
        run: |
          ENVIRONMENT=""
          ACTION=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PREFIX="${GITHUB_REF#refs/tags/deploy-}"
            if [[ "$TAG_PREFIX" == "test-rig-dev"* ]]; then
              ENVIRONMENT="test-rig-dev"
            elif [[ "$TAG_PREFIX" == "test-rig-prod"* ]]; then
              ENVIRONMENT="test-rig-prod"
            elif [[ "$TAG_PREFIX" == "tn-dev"* ]]; then
              ENVIRONMENT="tn-dev"
            elif [[ "$TAG_PREFIX" == "tn-staging"* ]]; then
              ENVIRONMENT="tn-staging"
            else
              echo "::error::Invalid tag format. Expected 'deploy-<env>-*'."
              exit 1
            fi
            ACTION="deploy"
          else
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
          fi
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Debug workflow inputs
        run: |
          echo "Workflow inputs:"
          echo "action: ${{ github.event.inputs.action }}"
          echo "environment: ${{ steps.vars.outputs.environment }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"
          echo "runner: $RUNNER_OS, $RUNNER_NAME"
          echo "event_name: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify repository structure
        run: |
          ls -R
          if [[ ! -f deploy.sh ]]; then
            echo "::error::deploy.sh not found in repository"
            exit 1
          fi
          if [[ ! -f docker-compose.yml ]]; then
            echo "::error::docker-compose.yml not found in repository"
            exit 1
          fi

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/lib/apt/lists
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/deploy.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install rsync and dos2unix
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync dos2unix

      - name: Validate secrets
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          missing_secrets=""
          invalid_hosts=""

          [[ -z "${{ secrets.SSH_KEY }}" ]] && missing_secrets="$missing_secrets SSH_KEY"
          [[ -z "${{ secrets.ENV_FILE }}" ]] && missing_secrets="$missing_secrets ENV_FILE"

          case "$ENVIRONMENT" in
            "test-rig-dev")
              [[ -z "${{ secrets.TEST_RIG_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_DEV_HOST"
              [[ "${{ secrets.TEST_RIG_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_DEV_HOST"
              ;;
            "test-rig-prod")
              [[ -z "${{ secrets.TEST_RIG_PROD_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_PROD_HOST"
              [[ "${{ secrets.TEST_RIG_PROD_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_PROD_HOST"
              ;;
            "tn-dev")
              [[ -z "${{ secrets.TN_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TN_DEV_HOST"
              [[ "${{ secrets.TN_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_DEV_HOST"
              ;;
            "tn-staging")
              [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets="$missing_secrets TN_STAGING_HOST"
              [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets="$missing_secrets JUMPHOST"
              [[ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]] && missing_secrets="$missing_secrets SLACK_WEBHOOK_URL"
              [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_STAGING_HOST"
              [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts JUMPHOST"
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac

          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for $ENVIRONMENT:$missing_secrets"
            exit 1
          fi

          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid host format (expected user@host) for $ENVIRONMENT:$invalid_hosts"
            exit 1
          fi

      - name: Generate and store public key
        run: |
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh-keygen -y -f /tmp/id_rsa > /tmp/id_rsa.pub
          echo "public_key=$(cat /tmp/id_rsa.pub)" >> "$GITHUB_ENV"

      - name: Set up SSH keys and config
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          mkdir -p ~/.ssh
          chmod 600 /tmp/id_rsa

          case "$ENVIRONMENT" in
            "test-rig-dev")
              HOST="${{ secrets.TEST_RIG_DEV_HOST }}"
              TARGET_DIR="/home/sudeepr/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              ;;
            "test-rig-prod")
              HOST="${{ secrets.TEST_RIG_PROD_HOST }}"
              TARGET_DIR="/home/sudeepr/all-services/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              ;;
            "tn-dev")
              HOST="${{ secrets.TN_DEV_HOST }}"
              TARGET_DIR="/home/alldevuser/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              ;;
            "tn-staging")
              HOST="${{ secrets.TN_STAGING_HOST }}"
              JUMPHOST="${{ secrets.JUMPHOST }}"
              TARGET_DIR="/home/deployment/all-services/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              JUMPHOST_USER="${JUMPHOST%%@*}"
              JUMPHOST_HOST="${JUMPHOST##*@}"

              cat > ~/.ssh/config << EOL
Host jumphost
  HostName ${JUMPHOST_HOST}
  User ${JUMPHOST_USER}
  IdentityFile /tmp/id_rsa
  StrictHostKeyChecking no
  ServerAliveInterval 180
  ServerAliveCountMax 15

Host target
  HostName ${HOSTNAME}
  User ${USER}
  IdentityFile /tmp/id_rsa
  ProxyJump jumphost
  StrictHostKeyChecking no
  ServerAliveInterval 180
  ServerAliveCountMax 15
EOL
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac

          # For environments without a jump host (only if not tn-staging)
          if [[ "$ENVIRONMENT" != "tn-staging" ]]; then
            cat > ~/.ssh/config << EOL
Host target
  HostName ${HOSTNAME}
  User ${USER}
  IdentityFile /tmp/id_rsa
  StrictHostKeyChecking no
  ServerAliveInterval 180
  ServerAliveCountMax 15
EOL
          fi

          chmod 600 ~/.ssh/config
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_ENV"
          echo "remote_user=$USER" >> "$GITHUB_ENV"

          ssh-keyscan -H "$HOSTNAME" >> ~/.ssh/known_hosts 2>/dev/null || true
          [[ -n "$JUMPHOST" ]] && ssh-keyscan -H "$JUMPHOST_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Setup SSH key on target for tn-staging
        if: steps.vars.outputs.environment == 'tn-staging'
        run: |
          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "mkdir -p ~/.ssh && chmod 700 ~/.ssh" && break
            echo "SSH mkdir attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to create .ssh directory"; exit 1; }

          echo "${{ env.public_key }}" > /tmp/id_rsa.pub
          rsync -avz -e "ssh -F ~/.ssh/config" /tmp/id_rsa.pub target:~/.ssh/id_rsa.pub || {
            echo "::error::Failed to transfer public key"
            exit 1
          }

          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys" && break
            echo "SSH authorized_keys update attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to update authorized_keys"; exit 1; }

          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "ls -ld ~ ~/.ssh ~/.ssh/authorized_keys && cat ~/.ssh/authorized_keys" && break
            echo "Verify authorized_keys attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to verify authorized_keys"; exit 1; }

      - name: Test host connectivity
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          if [[ "$ENVIRONMENT" == "tn-staging" ]]; then
            for attempt in {1..5}; do
              ssh -F ~/.ssh/config jumphost "echo Jump host connection successful" && break
              echo "Jump host attempt $attempt failed, retrying..."
              sleep 10
            done || { echo "::error::Jump host connection failed"; exit 1; }
          fi

          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "echo Target host connection successful" && break
            echo "Target host attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Target host connection failed"; exit 1; }

      - name: Install dos2unix on target server
        run: |
          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "sudo apt-get update && sudo apt-get install -y dos2unix" && break
            echo "dos2unix install attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::warning::Failed to install dos2unix on target"; }

      - name: Create and transfer .env file
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          echo "${{ secrets.ENV_FILE }}" > .env
          chmod 600 .env
          for attempt in {1..5}; do
            rsync -avz --timeout=60 -e "ssh -F ~/.ssh/config" .env target:"$TARGET_DIR/.env" && break
            echo "Rsync .env attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to rsync .env file"; exit 1; }

          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "ls -l $TARGET_DIR/.env && cat $TARGET_DIR/.env" && break
            echo "Verify .env attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to verify .env file on target"; exit 1; }

          rm -f .env

      - name: Transfer and Verify docker-compose.yml on server
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          # Transfer docker-compose.yml to the target server
          for attempt in {1..5}; do
            rsync -avz --timeout=60 -e "ssh -F ~/.ssh/config" docker-compose.yml target:"$TARGET_DIR/docker-compose.yml" && break
            echo "Rsync docker-compose.yml attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to rsync docker-compose.yml"; exit 1; }

          # Now, run the verification on the remote server
          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "cd $TARGET_DIR && cat docker-compose.yml && docker-compose config" && break
            echo "Verify docker-compose.yml attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to validate docker-compose.yml"; exit 1; }

      - name: Clean up Git working directory
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "cd $TARGET_DIR && git status && git stash --include-untracked || true && git reset --hard || true && git clean -fd || true" && break
            echo "Git cleanup attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to clean Git working directory"; exit 1; }

      - name: Clean up Docker environment
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "cd $TARGET_DIR && docker-compose down --remove-orphans || true && docker rm -f content-service || true" && break
            echo "Docker cleanup attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to clean Docker environment"; exit 1; }

      - name: Verify deploy.sh syntax
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          dos2unix deploy.sh
          bash -n deploy.sh || { echo "::error::Syntax error in deploy.sh locally"; exit 1; }

          for attempt in {1..5}; do
            rsync -avz --timeout=60 -e "ssh -F ~/.ssh/config" deploy.sh target:"$TARGET_DIR/deploy.sh" && break
            echo "Rsync deploy.sh attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to rsync deploy.sh"; exit 1; }

          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "dos2unix $TARGET_DIR/deploy.sh && bash -n $TARGET_DIR/deploy.sh" && break
            echo "Remote deploy.sh verification failed, retrying..."
            sleep 10
          done || { echo "::error::Syntax error in remote deploy.sh"; exit 1; }

      - name: Deploy or Rollback
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          ACTION="${{ steps.vars.outputs.action }}"
          TARGET_DIR="${{ env.target_dir }}"

          if [[ "$ACTION" == "deploy" ]]; then
            BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          elif [[ "$ACTION" == "rollback" ]]; then
            BRANCH="${{ github.event.inputs.rollback_tag }}"
            if [[ -z "$BRANCH" ]]; then
              echo "::error::Rollback tag required"
              exit 1
            fi
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "cd $TARGET_DIR && sudo bash deploy.sh \"$TARGET_DIR\" \"$BRANCH\" \"$ACTION\"" && break
            echo "$ACTION attempt $attempt failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to $ACTION after 5 attempts"; exit 1; }

      - name: Verify container logs
        run: |
          for attempt in {1..5}; do
            ssh -F ~/.ssh/config target "docker logs content-service || echo 'No logs available'" && break
            echo "Log verification failed, retrying..."
            sleep 10
          done || { echo "::error::Failed to retrieve container logs"; exit 1; }

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && 'Succeeded' || 'Failed' }}"
          EMOJI="${{ job.status == 'success' && ':white_check_mark:' || ':x:' }}"
          SLACK_MESSAGE="*$EMOJI Deployment $STATUS for all-content-service*
*Environment:* ${{ steps.vars.outputs.environment }}
*Action:* ${{ github.event.inputs.action }}
*Ref:* ${{ github.ref_name }}
*Run URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "${{ github.event.inputs.action }}" == "rollback" && -n "${{ github.event.inputs.rollback_tag }}" ]]; then
            SLACK_MESSAGE+="\n*Rollback Tag:* ${{ github.event.inputs.rollback_tag }}"
          fi

          # Ensure SLACK_WEBHOOK_URL is not empty before attempting to curl
          if [[ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]]; then
            curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$SLACK_MESSAGE\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
          else
            echo "::warning::SLACK_WEBHOOK_URL secret is not set, skipping Slack notification."
          fi

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f /tmp/id_rsa /tmp/id_rsa.pub ~/.ssh/config ~/.ssh/known_hosts
