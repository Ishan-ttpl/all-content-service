name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
        type: string
      rollback_tag:
        description: 'Tag to rollback to (only for rollback, e.g., deploy-tn-staging-v1.0.0)'
        required: false
        type: string

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'tn-staging' }}
    steps:
      - name: Determine environment and action
        id: vars
        run: |
          ENVIRONMENT=""
          ACTION=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PREFIX="${GITHUB_REF#refs/tags/deploy-}"
            if [[ "$TAG_PREFIX" == "test-rig-dev"* ]]; then
              ENVIRONMENT="test-rig-dev"
            elif [[ "$TAG_PREFIX" == "test-rig-prod"* ]]; then
              ENVIRONMENT="test-rig-prod"
            elif [[ "$TAG_PREFIX" == "tn-dev"* ]]; then
              ENVIRONMENT="tn-dev"
            elif [[ "$TAG_PREFIX" == "tn-staging"* ]]; then
              ENVIRONMENT="tn-staging"
            else
              echo "::error::Invalid tag format. Expected 'deploy-<env>-*'."
              exit 1
            fi
            ACTION="deploy"
          else
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
          fi
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Debug workflow inputs
        run: |
          echo "Workflow inputs:"
          echo "action: ${{ github.event.inputs.action }}"
          echo "environment: ${{ steps.vars.outputs.environment }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/lib/apt/lists
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/test.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install rsync and dos2unix
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync dos2unix

      - name: Validate secrets using direct assignment
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          missing_secrets=""
          invalid_hosts=""

          _deploy_script_content="${{ secrets.DEPLOY_SCRIPT_CONTENT }}"
          _docker_compose_content="${{ secrets.DOCKER_COMPOSE_CONTENT }}"
          _ssh_key="${{ secrets.SSH_KEY }}"
          _env_file="${{ secrets.ENV_FILE }}"

          [[ -z "$_deploy_script_content" ]] && missing_secrets+=" DEPLOY_SCRIPT_CONTENT"
          [[ -z "$_docker_compose_content" ]] && missing_secrets+=" DOCKER_COMPOSE_CONTENT"
          [[ -z "$_ssh_key" ]] && missing_secrets+=" SSH_KEY"
          [[ -z "$_env_file" ]] && missing_secrets+=" ENV_FILE"

          case "$ENVIRONMENT" in
            "test-rig-dev")
              [[ -z "${{ secrets.TEST_RIG_DEV_HOST }}" ]] && missing_secrets+=" TEST_RIG_DEV_HOST"
              [[ "${{ secrets.TEST_RIG_DEV_HOST }}" != *"@"* ]] && invalid_hosts+=" TEST_RIG_DEV_HOST"
              ;;
            "test-rig-prod")
              [[ -z "${{ secrets.TEST_RIG_PROD_HOST }}" ]] && missing_secrets+=" TEST_RIG_PROD_HOST"
              [[ "${{ secrets.TEST_RIG_PROD_HOST }}" != *"@"* ]] && invalid_hosts+=" TEST_RIG_PROD_HOST"
              ;;
            "tn-dev")
              [[ -z "${{ secrets.TN_DEV_HOST }}" ]] && missing_secrets+=" TN_DEV_HOST"
              [[ "${{ secrets.TN_DEV_HOST }}" != *"@"* ]] && invalid_hosts+=" TN_DEV_HOST"
              ;;
            "tn-staging")
              [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets+=" TN_STAGING_HOST"
              [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets+=" JUMPHOST"
              [[ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]] && missing_secrets+=" SLACK_WEBHOOK_URL"
              [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts+=" TN_STAGING_HOST"
              [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts+=" JUMPHOST"
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac

          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for $ENVIRONMENT:$missing_secrets"
            exit 1
          fi

          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid host format (expected user@host) for $ENVIRONMENT:$invalid_hosts"
            exit 1
          fi

      - name: Create files from secrets
        run: |
          echo "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" > deploy.sh
          echo "${{ secrets.DOCKER_COMPOSE_CONTENT }}" > docker-compose.yml
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa

          chmod +x deploy.sh
          chmod 600 /tmp/id_rsa
          dos2unix deploy.sh docker-compose.yml .env

      - name: Set up SSH keys and config
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          mkdir -p ~/.ssh
          case "$ENVIRONMENT" in
            "test-rig-dev")
              HOST="${{ secrets.TEST_RIG_DEV_HOST }}"
              TARGET_DIR="/home/sudeepr/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              ;;
            "test-rig-prod")
              HOST="${{ secrets.TEST_RIG_PROD_HOST }}"
              TARGET_DIR="/home/sudeepr/all-services/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              ;;
            "tn-dev")
              HOST="${{ secrets.TN_DEV_HOST }}"
              TARGET_DIR="/home/alldevuser/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              ;;
            "tn-staging")
              HOST="${{ secrets.TN_STAGING_HOST }}"
              JUMPHOST="${{ secrets.JUMPHOST }}"
              TARGET_DIR="/home/deployment/all-services/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              JUMPHOST_USER="${JUMPHOST%%@*}"
              JUMPHOST_HOST="${JUMPHOST##*@}"

              # Safe multi-line string using EOF marker
              cat > ~/.ssh/config << 'EOL'
Host jumphost
  HostName ${JUMPHOST_HOST}
  User ${JUMPHOST_USER}
  IdentityFile /tmp/id_rsa
  StrictHostKeyChecking no
  ServerAliveInterval 180
  ServerAliveCountMax 15

Host target
  HostName ${HOSTNAME}
  User ${USER}
  IdentityFile /tmp/id_rsa
  ProxyJump jumphost
EOL
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac

          [[ -z "$JUMPHOST" && -n "$HOST" ]] && cat > ~/.ssh/config << EOL
Host target
  HostName ${HOSTNAME}
  User ${USER}
  IdentityFile /tmp/id_rsa
EOL

          chmod 600 ~/.ssh/config
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_ENV"
          echo "remote_user=$USER" >> "$GITHUB_ENV"

          ssh-keyscan -H "$HOSTNAME" >> ~/.ssh/known_hosts 2>/dev/null || true
          [[ -n "$JUMPHOST" ]] && ssh-keyscan -H "${JUMPHOST##*@}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Setup SSH key on target for tn-staging (if needed)
        if: steps.vars.outputs.environment == 'tn-staging'
        run: |
          echo "${{ secrets.SSH_KEY }}" | ssh-keygen -y -f /dev/stdin > /tmp/id_rsa.pub
          public_key=$(cat /tmp/id_rsa.pub)
          echo "$public_key" | ssh -F ~/.ssh/config target "sudo tee -a ~/.ssh/authorized_keys > /dev/null && sudo chmod 600 ~/.ssh/authorized_keys"

      - name: Transfer files to target
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          rsync -avz -e "ssh -F ~/.ssh/config" deploy.sh docker-compose.yml target:"$TARGET_DIR/"
          rsync -avz -e "ssh -F ~/.ssh/config" .env target:"$TARGET_DIR/.env"

      - name: Execute deploy script
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          BRANCH_OR_TAG="${{ github.event.inputs.branch || github.ref_name }}"
          ssh -F ~/.ssh/config target "cd $TARGET_DIR && sudo bash deploy.sh \"$TARGET_DIR\" \"$BRANCH_OR_TAG\" \"deploy\""

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && 'Succeeded' || 'Failed' }"
          EMOJI="${{ job.status == 'success' && ':white_check_mark:' || ':x:' }}"
          SLACK_MESSAGE="*All-Content-Service Deployment Status: $STATUS $EMOJI*
*Environment:* ${{ steps.vars.outputs.environment }}
*Run URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$SLACK_MESSAGE\"}" \
          "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f /tmp/id_rsa /tmp/id_rsa.pub .env deploy.sh docker-compose.yml
