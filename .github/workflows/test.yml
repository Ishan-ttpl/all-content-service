name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy or rollback'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, rollback]
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options: [test-rig-dev, test-rig-prod, tn-dev, tn-staging]
      branch:
        description: 'Branch to deploy (deploy only)'
        required: false
        default: 'main'
        type: string
      rollback_tag:
        description: 'Tag to rollback to (rollback only)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment }}
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync and SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync dos2unix

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Write SSH config for jumphost + target
        run: |
          JUMP="${{ secrets.JUMPHOST }}"
          TARGET="${{ secrets.TN_STAGING_HOST }}"
          mkdir -p ~/.ssh
          printf "Host jumphost\n  HostName %s\n  User %s\n  IdentityFile %s/key.pem\n  StrictHostKeyChecking no\n" \
            "${JUMP#*@}" "${JUMP%@*}" "$PWD" > ~/.ssh/config
          printf "Host target\n  HostName %s\n  User %s\n  IdentityFile %s/key.pem\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n" \
            "${TARGET#*@}" "${TARGET%@*}" "$PWD" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Add known hosts
        run: |
          JUMP="${{ secrets.JUMPHOST }}"
          TARGET="${{ secrets.TN_STAGING_HOST }}"
          ssh-keyscan "${JUMP#*@}" >> ~/.ssh/known_hosts || true
          ssh-keyscan "${TARGET#*@}" >> ~/.ssh/known_hosts || true

      - name: Transfer deploy.sh to target
        run: |
          TARGET_DIR="/home/deployment/all-services/all-content-service"
          mkdir -p scripts/
          echo "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" | base64 --decode > scripts/deploy.sh
          chmod +x scripts/deploy.sh
          dos2unix scripts/deploy.sh

          rsync -avz \
            -e "ssh -F ~/.ssh/config" \
            scripts/deploy.sh \
            target:"$TARGET_DIR/scripts/"

      - name: Execute remote deploy.sh
        env:
          DOCKER_COMPOSE_CONTENT_B64: ${{ secrets.DOCKER_COMPOSE_CONTENT_B64 }}
          ENV_FILE_B64:             ${{ secrets.ENV_FILE_B64 || '' }}
        run: |
          if [[ "${{ github.event.inputs.action }}" == "rollback" ]]; then
            REF="${{ github.event.inputs.rollback_tag }}"
          else
            REF="${{ github.event.inputs.branch }}"
          fi

          if [[ -z "$REF" ]]; then
            echo "::error::No branch or rollback_tag provided"; exit 1
          fi

          ssh -F ~/.ssh/config target << EOF
            set -e
            mkdir -p /home/deployment/all-services/all-content-service/scripts/
            cd /home/deployment/all-services/all-content-service
            export DOCKER_COMPOSE_CONTENT_B64='${DOCKER_COMPOSE_CONTENT_B64}'
            export ENV_FILE_B64='${ENV_FILE_B64}'
            echo "Running deployment script..."
            sudo bash scripts/deploy.sh "$PWD" "$REF" "${{ github.event.inputs.action }}"
            EOF
