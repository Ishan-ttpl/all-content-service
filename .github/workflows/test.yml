name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (deploy or rollback)'
        required: true
        default: 'deploy'
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host staging
            HostName 10.3.0.9
            User all-staging-user
            IdentityFile ~/.ssh/id_rsa
            ProxyJump sudeepr@4.240.49.92
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to staging server
        run: |
          set -euxo pipefail
          
          TARGET_DIR=/home/deployment/all-services/all-content-service
          ACTION="${{ github.event.inputs.action }}"
          REF="${{ github.event.inputs.branch }}"

          rsync -az deploy.sh staging:"$TARGET_DIR"/deploy.sh
          rsync -az docker-compose.yml staging:"$TARGET_DIR"/docker-compose.yml

          if [[ -f .env ]]; then
            rsync -az .env staging:"$TARGET_DIR"/.env
          fi

          ssh staging <<EOF
            set -euo pipefail
            cd "$TARGET_DIR"
            sudo bash deploy.sh "\$PWD" "$REF" "$ACTION"
          EOF

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: >
            {
              "text": ":${{ job.status == 'success' && 'white_check_mark' || 'x' }}: *${{ github.event.inputs.action }}* on *${{ github.event.inputs.branch }}* — *${{ job.status }}*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
