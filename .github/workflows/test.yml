name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
        type: string
      rollback_tag:
        description: 'Tag to rollback to (only for rollback, e.g., deploy-tn-staging-v1.0.0)'
        required: false
        type: string

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'tn-staging' }}

    steps:
      - name: Determine environment and action
        id: vars
        run: |
          ENVIRONMENT=""
          ACTION=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PREFIX="${GITHUB_REF#refs/tags/deploy-}"
            if [[ "$TAG_PREFIX" == "test-rig-dev"* ]]; then
              ENVIRONMENT="test-rig-dev"
            elif [[ "$TAG_PREFIX" == "test-rig-prod"* ]]; then
              ENVIRONMENT="test-rig-prod"
            elif [[ "$TAG_PREFIX" == "tn-dev"* ]]; then
              ENVIRONMENT="tn-dev"
            elif [[ "$TAG_PREFIX" == "tn-staging"* ]]; then
              ENVIRONMENT="tn-staging"
            else
              echo "::error::Invalid tag format. Expected 'deploy-<env>-*'."
              exit 1
            fi
            ACTION="deploy"
          else
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
          fi
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Debug workflow inputs
        run: |
          echo "Workflow inputs:"
          echo "action: ${{ github.event.inputs.action }}"
          echo "environment: ${{ steps.vars.outputs.environment }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"
          echo "runner: $RUNNER_OS, $RUNNER_NAME"
          echo "event_name: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"

      # Removed 'Checkout code' and 'Verify repository structure' for deploy.sh/docker-compose.yml

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/lib/apt/lists
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/test.yml') }} # Hash the workflow file itself
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install rsync and dos2unix
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync dos2unix

      - name: Validate secrets
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          missing_secrets=""
          invalid_hosts=""
          
          # Correct way to check for the presence of multi-line secrets
          [[ -z "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" ]] && missing_secrets="$missing_secrets DEPLOY_SCRIPT_CONTENT"
          [[ -z "${{ secrets.DOCKER_COMPOSE_CONTENT }}" ]] && missing_secrets="$missing_secrets DOCKER_COMPOSE_CONTENT"

          [[ -z "${{ secrets.SSH_KEY }}" ]] && missing_secrets="$missing_secrets SSH_KEY"
          [[ -z "${{ secrets.ENV_FILE }}" ]] && missing_secrets="$missing_secrets ENV_FILE"

          case "$ENVIRONMENT" in
            "test-rig-dev")
              [[ -z "${{ secrets.TEST_RIG_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_DEV_HOST"
              [[ "${{ secrets.TEST_RIG_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_DEV_HOST"
              ;;
            "test-rig-prod")
              [[ -z "${{ secrets.TEST_RIG_PROD_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_PROD_HOST"
              [[ "${{ secrets.TEST_RIG_PROD_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_PROD_HOST"
              ;;
            "tn-dev")
              [[ -z "${{ secrets.TN_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TN_DEV_HOST"
              [[ "${{ secrets.TN_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_DEV_HOST"
              ;;
            "tn-staging")
              [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets="$missing_secrets TN_STAGING_HOST"
              [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets="$missing_secrets JUMPHOST"
              [[ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]] && missing_secrets="$missing_secrets SLACK_WEBHOOK_URL"
              [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_STAGING_HOST"
              [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts JUMPHOST"
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for $ENVIRONMENT:$missing_secrets"
            exit 1
          fi
          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid host format (expected user@host) for $ENVIRONMENT:$invalid_hosts"
            exit 1
          fi

      - name: Generate and store public key
        run: |
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh-keygen -y -f /tmp/id_rsa > /tmp/id_rsa.pub
          ls -l /tmp/id_rsa.pub
          cat /tmp/id_rsa.pub
          echo "public_key=$(cat /tmp/id_rsa.pub)" >> "$GITHUB_ENV"

      - name: Set up SSH keys and config
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          mkdir -p ~/.ssh
          chmod 600 /tmp/id_rsa
          ls -l /tmp/id_rsa
          ssh-keygen -l -f /tmp/id_rsa
          case "$ENVIRONMENT" in
            "test-rig-dev")
              HOST="${{ secrets.TEST_RIG_DEV_HOST }}"
              TARGET_DIR="/home/sudeepr/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 180\n  ServerAliveCountMax 15" > /tmp/ssh_config
              ;;
            "test-rig-prod")
              HOST="${{ secrets.TEST_RIG_PROD_HOST }}"
              TARGET_DIR="/home/sudeepr/all-services/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 180\n  ServerAliveCountMax 15" > /tmp/ssh_config
              ;;
            "tn-dev")
              HOST="${{ secrets.TN_DEV_HOST }}"
              TARGET_DIR="/home/alldevuser/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 180\n  ServerAliveCountMax 15" > /tmp/ssh_config
              ;;
            "tn-staging")
              HOST="${{ secrets.TN_STAGING_HOST }}"
              JUMPHOST="${{ secrets.JUMPHOST }}"
              TARGET_DIR="/home/deployment/all-services/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              JUMPHOST_USER="${JUMPHOST%%@*}"
              JUMPHOST_HOST="${JUMPHOST##*@}"
              echo -e "Host jumphost\n  HostName $JUMPHOST_HOST\n  User $JUMPHOST_USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 180\n  ServerAliveCountMax 15\nHost target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 180\n  ServerAliveCountMax 15" > /tmp/ssh_config
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          chmod 600 /tmp/ssh_config
          ls -l /tmp/ssh_config
          cat /tmp/ssh_config
          echo "remote_user=$USER" >> "$GITHUB_ENV"
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_ENV"
          # Add host keys to known_hosts to avoid prompts during SSH
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts 2>/dev/null || true
          if [[ -n "$JUMPHOST" ]]; then
            JUMPHOST_HOSTNAME="${JUMPHOST##*@}"
            ssh-keyscan -H "$JUMPHOST_HOSTNAME" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi
          cat ~/.ssh/known_hosts

      - name: Setup SSH key on target for tn-staging (if needed)
        if: steps.vars.outputs.environment == 'tn-staging'
        run: |
          echo "Attempting to create .ssh directory and add public key to authorized_keys on target..."
          for attempt in {1..5}; do
            ssh -F /tmp/ssh_config target "sudo mkdir -p ~/.ssh && sudo chmod 700 ~/.ssh" && break
            echo "SSH mkdir attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to create .ssh directory on target"; exit 1; }

          echo "${{ env.public_key }}" | ssh -F /tmp/ssh_config target "cat >> ~/.ssh/authorized_keys && sudo chmod 600 ~/.ssh/authorized_keys" || {
             echo "::error::Failed to add public key to authorized_keys. This step might require manual intervention if authorized_keys already exists and is not writable by current user directly."
             exit 1
          }

          for attempt in {1..5}; do
            ssh -F /tmp/ssh_config target "ls -ld ~ ~/.ssh ~/.ssh/authorized_keys && cat ~/.ssh/authorized_keys" && break
            echo "SSH verify authorized_keys attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to verify authorized_keys permissions/content"; exit 1; }

      - name: Test host connectivity
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          if [[ "$ENVIRONMENT" == "tn-staging" ]]; then
            echo "Testing jump host connectivity..."
            for attempt in {1..5}; do
              ssh -vvv -F /tmp/ssh_config jumphost "echo 'Jump host connection successful'" && break
              echo "Jump host attempt $attempt failed, retrying in 10 seconds..."
              sleep 10
            done || { echo "::error::Jump host connection failed"; cat /tmp/ssh_config; exit 1; }
          fi

          echo "Testing target host connectivity..."
          for attempt in {1..5}; do
            ssh -vvv -F /tmp/ssh_config target "echo 'Target host connection successful'" && break
            echo "Target host attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Target host connection failed"; cat /tmp/ssh_config; exit 1; }

      - name: Install dos2unix on target server
        run: |
          echo "Attempting to install dos2unix on target server..."
          for attempt in {1..5}; do
            ssh -F /tmp/ssh_config target "sudo apt-get update && sudo apt-get install -y dos2unix" && break
            echo "dos2unix install attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::warning::Failed to install dos2unix on target server. Proceeding but beware of line ending issues."; }

      - name: Create deploy.sh and docker-compose.yml on runner from secrets
        run: |
          echo "Creating deploy.sh from DEPLOY_SCRIPT_CONTENT secret..."
          echo "${{ secrets.DEPLOY_SCRIPT_CONTENT }}" > deploy.sh
          echo "Creating docker-compose.yml from DOCKER_COMPOSE_CONTENT secret..."
          echo "${{ secrets.DOCKER_COMPOSE_CONTENT }}" > docker-compose.yml
          chmod +x deploy.sh
          # Convert line endings immediately to prevent issues during transfer/execution
          dos2unix deploy.sh docker-compose.yml
          echo "--- deploy.sh content (first 20 lines) ---"
          head -n 20 deploy.sh
          echo "--- docker-compose.yml content ---"
          cat docker-compose.yml

      - name: Create and transfer .env file
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          echo "Creating .env file locally from ENV_FILE secret..."
          echo "${{ secrets.ENV_FILE }}" > .env
          chmod 600 .env
          ls -l .env

          echo "Transferring .env file to target: $TARGET_DIR/.env"
          for attempt in {1..5}; do
            # Transfer .env to the TARGET_DIR on the remote server
            rsync -avz --timeout=60 -e "ssh -vvv -F /tmp/ssh_config" .env target:$TARGET_DIR/.env && break
            echo "Rsync .env attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to rsync .env file after 5 attempts"; exit 1; }

          echo "Verifying .env file on target..."
          for attempt in {1..5}; do
            ssh -vvv -F /tmp/ssh_config target "ls -l $TARGET_DIR/.env && sudo cat $TARGET_DIR/.env | head -n 5" && break # Use sudo cat and limit output
            echo "Verify .env attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to verify .env on target server"; exit 1; }

          rm -f .env # Clean up local .env

      - name: Transfer deploy.sh and docker-compose.yml to target
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          
          echo "Transferring deploy.sh to target: $TARGET_DIR/deploy.sh"
          for attempt in {1..5}; do
            rsync -avz --timeout=60 -e "ssh -vvv -F /tmp/ssh_config" deploy.sh target:$TARGET_DIR/deploy.sh && break
            echo "Rsync deploy.sh attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to rsync deploy.sh"; exit 1; }

          echo "Transferring docker-compose.yml to target: $TARGET_DIR/docker-compose.yml"
          for attempt in {1..5}; do
            rsync -avz --timeout=60 -e "ssh -vvv -F /tmp/ssh_config" docker-compose.yml target:$TARGET_DIR/docker-compose.yml && break
            echo "Rsync docker-compose.yml attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to rsync docker-compose.yml"; exit 1; }

          echo "Setting execute permissions on deploy.sh on target..."
          for attempt in {1..5}; do
            ssh -F /tmp/ssh_config target "sudo chmod +x $TARGET_DIR/deploy.sh" && break
            echo "Chmod deploy.sh attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to set execute permissions on deploy.sh"; exit 1; }

          echo "Verifying transferred deploy.sh and docker-compose.yml on target..."
          for attempt in {1..5}; do
            ssh -F /tmp/ssh_config target "ls -la $TARGET_DIR/deploy.sh $TARGET_DIR/docker-compose.yml && sudo head -n 5 $TARGET_DIR/deploy.sh && sudo cat $TARGET_DIR/docker-compose.yml" && break
            echo "Verify transferred files attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to verify transferred deploy.sh and docker-compose.yml on target"; exit 1; }


      - name: Execute Deploy or Rollback Script on Target
        run: |
          ACTION="${{ steps.vars.outputs.action }}"
          TARGET_DIR="${{ env.target_dir }}"
          
          if [[ "$ACTION" == "deploy" ]]; then
            BRANCH_OR_TAG="${{ github.event.inputs.branch || github.ref_name }}"
          elif [[ "$ACTION" == "rollback" ]]; then
            BRANCH_OR_TAG="${{ github.event.inputs.rollback_tag }}"
            if [[ -z "$BRANCH_OR_TAG" ]]; then
              echo "::error::Rollback tag required for rollback action."
              exit 1
            fi
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

          echo "Executing deploy.sh on target: $TARGET_DIR/deploy.sh \"$TARGET_DIR\" \"$BRANCH_OR_TAG\" \"$ACTION\""
          for attempt in {1..5}; do
            # Execute the deploy.sh script directly on the remote server using sudo
            ssh -F /tmp/ssh_config target "sudo bash $TARGET_DIR/deploy.sh \"$TARGET_DIR\" \"$BRANCH_OR_TAG\" \"$ACTION\"" && break
            echo "Execution attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done || { echo "::error::Failed to execute deploy.sh on target after 5 attempts"; exit 1; }

      - name: Final Container Status Verification (Post-deployment)
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          SERVICE_NAME="content-service" # Explicitly use the container_name defined in docker-compose.yml

          echo "Performing final verification of $SERVICE_NAME container status and logs..."
          for attempt in {1..15}; do # Increased attempts and sleep for robustness
            echo "Verifying container status, attempt $attempt of 15..."
            # Use sudo consistently for docker commands on target
            if ssh -F /tmp/ssh_config target "sudo docker ps --filter name=$SERVICE_NAME --format '{{.Status}}' | grep -q 'Up'"; then
                echo "$SERVICE_NAME container is running and healthy."
                ssh -F /tmp/ssh_config target "sudo docker logs $SERVICE_NAME --tail 100" # Tail more logs for debugging
                break
            else
                echo "$SERVICE_NAME container not yet running or not healthy. Retrying in 10 seconds..."
                sleep 10
            fi
          done || { echo "::error::Failed to verify $SERVICE_NAME container status and logs after multiple attempts. Manual inspection required."; exit 1; }


      - name: Notify Slack
        if: always()
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          STATUS="${{ job.status == 'success' && 'Succeeded' || 'Failed' }}"
          EMOJI="${{ job.status == 'success' && ':white_check_mark:' || ':x:' }}"
          SLACK_MESSAGE="*All-Content-Service Deployment Status: $STATUS $EMOJI*\n*Environment:* $ENVIRONMENT\n*Action:* ${{ steps.vars.outputs.action }}\n*Ref:* ${{ github.ref_name }}\n*Run URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Add rollback tag to message if applicable
          if [[ "${{ steps.vars.outputs.action }}" == "rollback" && -n "${{ github.event.inputs.rollback_tag }}" ]]; then
            SLACK_MESSAGE+="\\n*Rollback Tag:* ${{ github.event.inputs.rollback_tag }}"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$SLACK_MESSAGE\"}" \
          "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Cleanup temporary files
        if: always()
        run: |
          echo "Cleaning up local temporary files..."
          rm -f /tmp/id_rsa /tmp/ssh_config .env deploy.sh docker-compose.yml /tmp/id_rsa.pub
