name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-*-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy or rollback'
        required: true
        type: choice
        options: [deploy, rollback]
        default: deploy
      environment:
        description: 'Environment'
        required: true
        type: choice
        options: [test-rig-dev, test-rig-prod, tn-dev, tn-staging]
        default: tn-staging
      branch:
        description: 'Branch to deploy (for deploy)'
        required: false
        default: main
      rollback_tag:
        description: 'Tag to rollback to (for rollback)'
        required: false

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      env: ${{ steps.determine.outputs.environment }}
      act: ${{ steps.determine.outputs.action }}
      ref: ${{ steps.determine.outputs.ref }}
    steps:
      - name: Determine environment, action & ref
        id: determine
        run: |
          # prefer tag-triggered deploy
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" =~ ^refs/tags/deploy- ]]; then
            TAG="${GITHUB_REF#refs/tags/deploy-}"
            echo "::debug::Tag deploy prefix → $TAG"
            ACTION=deploy
            REF="$TAG"
            ENV="${TAG%%-*}"
          else
            ACTION="${{ github.event.inputs.action }}"
            ENV="${{ github.event.inputs.environment }}"
            if [[ "$ACTION" == "rollback" ]]; then
              REF="${{ github.event.inputs.rollback_tag }}"
            else
              REF="${{ github.event.inputs.branch }}"
            fi
          fi
          if [[ -z "$REF" ]]; then
            echo "::error::No branch or rollback_tag provided for $ACTION"
            exit 1
          fi
          echo "environment=$ENV"  >> $GITHUB_OUTPUT
          echo "action=$ACTION"  >> $GITHUB_OUTPUT
          echo "ref=$REF"        >> $GITHUB_OUTPUT

  ssh-setup:
    runs-on: ubuntu-22.04
    needs: setup
    outputs:
      config: ${{ steps.ssh-config.outputs.path }}
    steps:
      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync dos2unix

      - name: Write SSH private key
        run: |
          echo "${{ secrets.SSH_KEY }}" | base64 -d > id_rsa
          chmod 600 id_rsa

      - name: Build SSH config
        id: ssh-config
        run: |
          mkdir -p ~/.ssh
          cfg=~/.ssh/config
          touch $cfg
          chmod 600 $cfg

          # read secrets into shell vars
          JUMP="${{ secrets.JUMPHOST }}"
          TARGET="${{ secrets.TN_STAGING_HOST }}"

          # jumphost entry
          printf "Host jumphost\n  HostName %s\n  User %s\n  IdentityFile %s/id_rsa\n  StrictHostKeyChecking no\n\n" \
            "${JUMP#*@}" "${JUMP%@*}" "$PWD" >> $cfg

          # target entry
          printf "Host target\n  HostName %s\n  User %s\n  IdentityFile %s/id_rsa\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n" \
            "${TARGET#*@}" "${TARGET%@*}" "$PWD" >> $cfg

          echo "::set-output name=path::$cfg"

      - name: Add known hosts
        run: |
          JUMP="${{ secrets.JUMPHOST }}"
          TARGET="${{ secrets.TN_STAGING_HOST }}"
          ssh-keyscan -H "${JUMP#*@}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H "${TARGET#*@}" >> ~/.ssh/known_hosts 2>/dev/null || true

  deploy_or_rollback:
    needs: [setup, ssh-setup]
    runs-on: ubuntu-22.04
    env:
      SSH_CFG: ${{ needs.ssh-setup.outputs.config }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Transfer files to remote
        run: |
          TARGET_DIR=/home/deployment/all-services/all-content-service
          rsync -avz -e "ssh -F $SSH_CFG" deploy.sh    target:$TARGET_DIR/
          rsync -avz -e "ssh -F $SSH_CFG" docker-compose.yml target:$TARGET_DIR/
          # .env is optional
          if [[ -f .env ]]; then
            rsync -avz -e "ssh -F $SSH_CFG" .env target:$TARGET_DIR/
          fi

      - name: Execute on remote
        run: |
          ACTION=${{ needs.setup.outputs.action }}
          REF=${{ needs.setup.outputs.ref }}
          ssh -F $SSH_CFG target << 'EOF'
            set -euo pipefail
            cd /home/deployment/all-services/all-content-service
            echo "Running $ACTION on $REF"
            sudo bash ./deploy.sh "$PWD" "$REF" "$ACTION"
          EOF

      - name: Verify remote container
        run: |
          ssh -F $SSH_CFG target "docker ps --filter name=content-service --format '{{.Status}}' | grep -q Up"

  notify:
    needs: deploy_or_rollback
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ":${{ job.status == 'success' && 'white_check_mark' || 'x' }}: *All-Content-Service* `${{ needs.setup.outputs.action }}` on `${{ needs.setup.outputs.environment }}` _ref=${{ needs.setup.outputs.ref }}_ \nStatus: `${{ job.status }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
