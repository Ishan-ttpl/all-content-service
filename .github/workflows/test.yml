name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        options: [deploy, rollback]
        default: deploy
      environment:
        type: choice
        options: [tn-staging]
        default: tn-staging
      branch:
        default: main
      rollback_tag:
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.action == 'rollback' && github.event.inputs.rollback_tag || github.event.inputs.branch }}

      - name: Install SSH & rsync
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Configure SSH (pure shell slicing)
        run: |
          # write key
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_KEY }}" | base64 -d > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

          # parse jump vs target
          JUMP="${{ secrets.JUMPHOST }}"
          TARGET="${{ secrets.TN_STAGING_HOST }}"

          # build config
          cat > "$HOME/.ssh/config" <<_EOF
          Host jumphost
            HostName $(echo "$JUMP" | cut -d@ -f2)
            User $(echo "$JUMP" | cut -d@ -f1)
            IdentityFile \$HOME/.ssh/id_rsa
            StrictHostKeyChecking no
          
          Host target
            HostName $(echo "$TARGET" | cut -d@ -f2)
            User $(echo "$TARGET" | cut -d@ -f1)
            IdentityFile \$HOME/.ssh/id_rsa
            ProxyJump jumphost
            StrictHostKeyChecking no
          _EOF
          chmod 600 "$HOME/.ssh/config"
          ls -la "$HOME/.ssh"

          # known_hosts
          ssh-keyscan -H "$(echo "$JUMP" | cut -d@ -f2)" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          ssh-keyscan -H "$(echo "$TARGET" | cut -d@ -f2)" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

      - name: Transfer & execute
        run: |
          SSH_OPTS="-F $HOME/.ssh/config"
          TARGET_DIR=/home/deployment/all-services/all-content-service

          # push scripts
          rsync -az -e "ssh $SSH_OPTS" deploy.sh    target:"$TARGET_DIR/"
          rsync -az -e "ssh $SSH_OPTS" docker-compose.yml target:"$TARGET_DIR/"

          # run remotely
          ssh $SSH_OPTS target <<'_END'
            set -euo pipefail
            cd /home/deployment/all-services/all-content-service
            ACTION="${{ github.event.inputs.action }}"
            REF="${{ github.event.inputs.action == 'rollback' && github.event.inputs.rollback_tag || github.event.inputs.branch }}"
            sudo bash deploy.sh "$PWD" "$REF" "$ACTION"
          _END

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            { "text": ":${{ job.status == 'success' && 'white_check_mark' || 'x' }}: ${{ github.event.inputs.action }} done (_ref=${{ github.event.inputs.branch || github.event.inputs.rollback_tag }})" }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
