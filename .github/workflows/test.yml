name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'test-rig-dev'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback, e.g., deploy-tn-staging-v1.0.0)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'test-rig-dev' }}

    steps:
      - name: Determine environment and action
        id: vars
        run: |
          ENVIRONMENT=""
          ACTION=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PREFIX="${GITHUB_REF#refs/tags/deploy-}"
            if [[ "$TAG_PREFIX" == "test-rig-dev"* ]]; then
              ENVIRONMENT="test-rig-dev"
            elif [[ "$TAG_PREFIX" == "test-rig-prod"* ]]; then
              ENVIRONMENT="test-rig-prod"
            elif [[ "$TAG_PREFIX" == "tn-dev"* ]]; then
              ENVIRONMENT="tn-dev"
            elif [[ "$TAG_PREFIX" == "tn-staging"* ]]; then
              ENVIRONMENT="tn-staging"
            else
              echo "::error::Invalid tag format. Expected 'deploy-<env>-*'."
              exit 1
            fi
            ACTION="deploy"
          else
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
          fi
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Debug workflow inputs
        run: |
          echo "Workflow inputs:"
          echo "action: ${{ github.event.inputs.action }}"
          echo "environment: ${{ steps.vars.outputs.environment }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"
          echo "runner: $RUNNER_OS, $RUNNER_NAME"
          echo "event_name: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Validate secrets
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          missing_secrets=""
          invalid_hosts=""
          [[ -z "${{ secrets.SSH_KEY }}" ]] && missing_secrets="$missing_secrets SSH_KEY"
          [[ -z "${{ secrets.ENV_FILE }}" ]] && missing_secrets="$missing_secrets ENV_FILE"
          case "$ENVIRONMENT" in
            "test-rig-dev")
              [[ -z "${{ secrets.TEST_RIG_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_DEV_HOST"
              [[ "${{ secrets.TEST_RIG_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_DEV_HOST"
              ;;
            "test-rig-prod")
              [[ -z "${{ secrets.TEST_RIG_PROD_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_PROD_HOST"
              [[ "${{ secrets.TEST_RIG_PROD_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_PROD_HOST"
              ;;
            "tn-dev")
              [[ -z "${{ secrets.TN_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TN_DEV_HOST"
              [[ "${{ secrets.TN_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_DEV_HOST"
              ;;
            "tn-staging")
              [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets="$missing_secrets TN_STAGING_HOST"
              [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets="$missing_secrets JUMPHOST"
              [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_STAGING_HOST"
              [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts JUMPHOST"
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for $ENVIRONMENT:$missing_secrets"
            exit 1
          fi
          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid host format (expected user@host) for $ENVIRONMENT:$invalid_hosts"
            exit 1
          fi

      - name: Set up SSH keys and config
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ls -l /tmp/id_rsa
          ssh-keygen -l -f /tmp/id_rsa
          case "$ENVIRONMENT" in
            "test-rig-dev")
              HOST="${{ secrets.TEST_RIG_DEV_HOST }}"
              TARGET_DIR="/home/sudeepr/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > /tmp/ssh_config
              ;;
            "test-rig-prod")
              HOST="${{ secrets.TEST_RIG_PROD_HOST }}"
              TARGET_DIR="/home/sudeepr/all-services/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > /tmp/ssh_config
              ;;
            "tn-dev")
              HOST="${{ secrets.TN_DEV_HOST }}"
              TARGET_DIR="/home/alldevuser/git/all-content-service"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > /tmp/ssh_config
              ;;
            "tn-staging")
              HOST="${{ secrets.TN_STAGING_HOST }}"
              JUMPHOST="${{ secrets.JUMPHOST }}"
              TARGET_DIR="/home/all-staging-user/all-services/all-content-deploy"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              JUMPHOST_USER="${JUMPHOST%%@*}"
              JUMPHOST_HOST="${JUMPHOST##*@}"
              echo -e "Host jumphost\n  HostName $JUMPHOST_HOST\n  User $JUMPHOST_USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\nHost target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > /tmp/ssh_config
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          chmod 600 /tmp/ssh_config
          ls -l /tmp/ssh_config
          cat /tmp/ssh_config
          echo "remote_user=$USER" >> "$GITHUB_ENV"
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_ENV"
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts 2>/dev/null || true
          if [[ -n "$JUMPHOST" ]]; then
            ssh-keyscan -H $JUMPHOST_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          fi
          cat ~/.ssh/known_hosts

      - name: Test host connectivity
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          if [[ "$ENVIRONMENT" == "tn-staging" ]]; then
            ssh -vvv -F /tmp/ssh_config jumphost "echo 'Jump host connection successful'" || { echo "::error::Jump host connection failed for $ENVIRONMENT"; cat /tmp/ssh_config; exit 1; }
            ssh -vvv -F /tmp/ssh_config target "echo 'Target host connection successful'" || { echo "::error::Target host connection failed for $ENVIRONMENT"; cat /tmp/ssh_config; exit 1; }
          else
            ssh -vvv -F /tmp/ssh_config target "echo 'Target host connection successful'" || { echo "::error::Target host connection failed for $ENVIRONMENT"; cat /tmp/ssh_config; exit 1; }
          fi

      - name: Create and transfer .env file
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          TARGET_DIR="${{ env.target_dir }}"
          echo "${{ secrets.ENV_FILE }}" > .env
          chmod 600 .env
          ls -l .env
          rsync -avz -e "ssh -vvv -F /tmp/ssh_config" .env target:$TARGET_DIR/.env || { echo "::error::Failed to rsync .env file for $ENVIRONMENT"; cat /tmp/ssh_config; exit 1; }
          ssh -F /tmp/ssh_config target "ls -l $TARGET_DIR/.env" || { echo "::error::Failed to verify .env on target server for $ENVIRONMENT"; exit 1; }
          rm -f .env

      - name: Verify docker-compose.yml on server
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          TARGET_DIR="${{ env.target_dir }}"
          ssh -F /tmp/ssh_config target "cat $TARGET_DIR/docker-compose.yml" || { echo "::error::Failed to verify docker-compose.yml for $ENVIRONMENT"; exit 1; }

      - name: Clean up Git working directory
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          TARGET_DIR="${{ env.target_dir }}"
          ssh -F /tmp/ssh_config target "cd $TARGET_DIR && \
            git stash --include-untracked || true && \
            git reset --hard || true && \
            git clean -fd || true" || { echo "::error::Failed to clean Git working directory for $ENVIRONMENT"; exit 1; }

      - name: Clean up Docker environment
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          TARGET_DIR="${{ env.target_dir }}"
          ssh -F /tmp/ssh_config target "cd $TARGET_DIR && \
            docker-compose down --remove-orphans || true && \
            docker rm -f content-service || true && \
            docker network rm ai-network || true && \
            docker network create all-learner-ai-services-ai-network || true" || { echo "::error::Failed to clean Docker environment for $ENVIRONMENT"; exit 1; }

      - name: Deploy or rollback
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          ACTION="${{ steps.vars.outputs.action }}"
          TARGET_DIR="${{ env.target_dir }}"
          rsync -avz -e "ssh -F /tmp/ssh_config" deploy.sh target:$TARGET_DIR/deploy.sh || { echo "::error::Failed to rsync deploy.sh for $ENVIRONMENT"; exit 1; }
          if [[ "$ACTION" == "deploy" ]]; then
            BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
            ssh -F /tmp/ssh_config target "chmod +x $TARGET_DIR/deploy.sh && $TARGET_DIR/deploy.sh $TARGET_DIR $BRANCH deploy"
          elif [[ "$ACTION" == "rollback" ]]; then
            ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo "::error::Rollback tag required for $ENVIRONMENT"
              exit 1
            fi
            ssh -F /tmp/ssh_config target "chmod +x $TARGET_DIR/deploy.sh && $TARGET_DIR/deploy.sh $TARGET_DIR $ROLLBACK_TAG rollback"
          else
            echo "::error::Invalid action: $ACTION for $ENVIRONMENT"
            exit 1
          fi

      - name: Verify container logs
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          ssh -F /tmp/ssh_config target "docker logs content-service || echo 'Failed to get container logs for $ENVIRONMENT'"

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f /tmp/id_rsa /tmp/ssh_config .env
