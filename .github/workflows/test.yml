name: Deploy to TN Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to staging server
    runs-on: ubuntu-latest
    env:
      RAW_HOST: ${{ secrets.TN_STAGING_HOST }}  # e.g., deployment@10.3.0.9

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host staging
            HostName 10.3.0.9
            User deployment
            IdentityFile ~/.ssh/id_rsa
            ProxyJump sudeepr@4.240.49.92
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF

          chmod 600 ~/.ssh/config

      - name: Transfer files to remote server
        run: |
          set -euxo pipefail

          : "${RAW_HOST:?Environment variable RAW_HOST is required}"

          USER="${RAW_HOST%@*}"
          HOST="${RAW_HOST#*@}"
          TARGET_DIR=/home/deployment/all-services/all-content-service
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -J sudeepr@4.240.49.92 -i ~/.ssh/id_rsa"

          rsync -az -e "ssh $SSH_OPTS" deploy.sh "$USER@$HOST:$TARGET_DIR/deploy.sh"
          rsync -az -e "ssh $SSH_OPTS" docker-compose.yml "$USER@$HOST:$TARGET_DIR/docker-compose.yml"

          if [[ -f .env ]]; then
            rsync -az -e "ssh $SSH_OPTS" .env "$USER@$HOST:$TARGET_DIR/.env"
          fi

      - name: Run deployment script on remote
        run: |
          set -euxo pipefail

          ssh -J sudeepr@4.240.49.92 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$RAW_HOST" <<'EOF'
            cd /home/deployment/all-services/all-content-service
            chmod +x deploy.sh
            ./deploy.sh
          EOF
