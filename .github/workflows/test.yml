name: Deploy or Rollback All Services

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback, e.g., deploy-tn-staging-v1.0.0)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'tn-staging' }}

    strategy:
      matrix:
        service:
          - all-content-service
          - all-learner-ai-services
          - all-orchestration-service

    steps:
      - name: Determine environment and action
        id: vars
        run: |
          ENVIRONMENT=""
          ACTION=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PREFIX="${GITHUB_REF#refs/tags/deploy-}"
            if [[ "$TAG_PREFIX" == "test-rig-dev"* ]]; then
              ENVIRONMENT="test-rig-dev"
            elif [[ "$TAG_PREFIX" == "test-rig-prod"* ]]; then
              ENVIRONMENT="test-rig-prod"
            elif [[ "$TAG_PREFIX" == "tn-dev"* ]]; then
              ENVIRONMENT="tn-dev"
            elif [[ "$TAG_PREFIX" == "tn-staging"* ]]; then
              ENVIRONMENT="tn-staging"
            else
              echo "::error::Invalid tag format. Expected 'deploy-<env>-*'."
              exit 1
            fi
            ACTION="deploy"
          else
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
          fi
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Debug workflow inputs
        run: |
          echo "Workflow inputs:"
          echo "action: ${{ github.event.inputs.action }}"
          echo "environment: ${{ steps.vars.outputs.environment }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"
          echo "service: ${{ matrix.service }}"
          echo "runner: $RUNNER_OS, $RUNNER_NAME"
          echo "event_name: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/lib/apt/lists
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/deploy.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install rsync and dos2unix
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync dos2unix

      - name: Validate secrets
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          missing_secrets=""
          invalid_hosts=""
          [[ -z "${{ secrets.SSH_KEY }}" ]] && missing_secrets="$missing_secrets SSH_KEY"
          [[ -z "${{ secrets.ENV_FILE }}" ]] && missing_secrets="$missing_secrets ENV_FILE"
          case "$ENVIRONMENT" in
            "test-rig-dev")
              [[ -z "${{ secrets.TEST_RIG_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_DEV_HOST"
              [[ "${{ secrets.TEST_RIG_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_DEV_HOST"
              ;;
            "test-rig-prod")
              [[ -z "${{ secrets.TEST_RIG_PROD_HOST }}" ]] && missing_secrets="$missing_secrets TEST_RIG_PROD_HOST"
              [[ "${{ secrets.TEST_RIG_PROD_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TEST_RIG_PROD_HOST"
              ;;
            "tn-dev")
              [[ -z "${{ secrets.TN_DEV_HOST }}" ]] && missing_secrets="$missing_secrets TN_DEV_HOST"
              [[ "${{ secrets.TN_DEV_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_DEV_HOST"
              ;;
            "tn-staging")
              [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets="$missing_secrets TN_STAGING_HOST"
              [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets="$missing_secrets JUMPHOST"
              [[ -z "${{ secrets.SLACK_BOT_TOKEN }}" ]] && missing_secrets="$missing_secrets SLACK_BOT_TOKEN"
              [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts TN_STAGING_HOST"
              [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts="$invalid_hosts JUMPHOST"
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for $ENVIRONMENT, $SERVICE:$missing_secrets"
            exit 1
          fi
          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid host format (expected user@host) for $ENVIRONMENT:$invalid_hosts"
            exit 1
          fi

      - name: Generate and store public key
        run: |
          echo "${{ secrets.SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh-keygen -y -f /tmp/id_rsa > /tmp/id_rsa.pub
          ls -l /tmp/id_rsa.pub
          cat /tmp/id_rsa.pub
          echo "public_key=$(cat /tmp/id_rsa.pub)" >> "$GITHUB_ENV"

      - name: Set up SSH keys and config
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          mkdir -p ~/.ssh
          chmod 600 /tmp/id_rsa
          ls -l /tmp/id_rsa
          ssh-keygen -l -f /tmp/id_rsa
          case "$ENVIRONMENT" in
            "test-rig-dev")
              HOST="${{ secrets.TEST_RIG_DEV_HOST }}"
              TARGET_DIR="/home/sudeepr/git/$SERVICE"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 60\n  ServerAliveCountMax 5" > /tmp/ssh_config
              ;;
            "test-rig-prod")
              HOST="${{ secrets.TEST_RIG_PROD_HOST }}"
              TARGET_DIR="/home/sudeepr/all-services/$SERVICE"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 60\n  ServerAliveCountMax 5" > /tmp/ssh_config
              ;;
            "tn-dev")
              HOST="${{ secrets.TN_DEV_HOST }}"
              TARGET_DIR="/home/alldevuser/git/$SERVICE"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              echo -e "Host target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 60\n  ServerAliveCountMax 5" > /tmp/ssh_config
              ;;
            "tn-staging")
              HOST="${{ secrets.TN_STAGING_HOST }}"
              JUMPHOST="${{ secrets.JUMPHOST }}"
              TARGET_DIR="/srv/services/$SERVICE"
              USER="${HOST%%@*}"
              HOSTNAME="${HOST##*@}"
              JUMPHOST_USER="${JUMPHOST%%@*}"
              JUMPHOST_HOST="${JUMPHOST##*@}"
              echo -e "Host jumphost\n  HostName $JUMPHOST_HOST\n  User $JUMPHOST_USER\n  IdentityFile /tmp/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 60\n  ServerAliveCountMax 5\nHost target\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile /tmp/id_rsa\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  ServerAliveInterval 60\n  ServerAliveCountMax 5" > /tmp/ssh_config
              ;;
            *)
              echo "::error::Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac
          chmod 600 /tmp/ssh_config
          ls -l /tmp/ssh_config
          cat /tmp/ssh_config
          echo "remote_user=$USER" >> "$GITHUB_ENV"
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_ENV"
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts 2>/dev/null || true
          if [[ -n "$JUMPHOST" ]]; then
            ssh-keyscan -H $JUMPHOST_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          fi
          cat ~/.ssh/known_hosts

      - name: Setup SSH key on target for tn-staging
        if: matrix.environment == 'tn-staging'
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          # Create .ssh directory and set permissions
          ssh -F /tmp/ssh_config target "mkdir -p ~/.ssh && chmod 700 ~/.ssh" || { echo "::error::Failed to create .ssh directory for $ENVIRONMENT, $SERVICE"; exit 1; }
          # Append public key to authorized_keys
          echo "${{ env.public_key }}" > /tmp/id_rsa.pub
          rsync -avz --timeout=30 -e "ssh -vvv -F /tmp/ssh_config" /tmp/id_rsa.pub target:~/.ssh/id_rsa.pub || { echo "::error::Failed to rsync public key for $ENVIRONMENT, $SERVICE"; exit 1; }
          ssh -F /tmp/ssh_config target "cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys" || { echo "::error::Failed to update authorized_keys for $ENVIRONMENT, $SERVICE"; exit 1; }
          # Verify authorized_keys
          ssh -F /tmp/ssh_config target "cat ~/.ssh/authorized_keys" || { echo "::error::Failed to verify authorized_keys for $ENVIRONMENT, $SERVICE"; exit 1; }

      - name: Test host connectivity
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          if [[ "$ENVIRONMENT" == "tn-staging" ]]; then
            ssh -vvv -F /tmp/ssh_config jumphost "echo 'Jump host connection successful for $SERVICE'" || { echo "::error::Jump host connection failed for $ENVIRONMENT, $SERVICE"; cat /tmp/ssh_config; exit 1; }
            ssh -vvv -F /tmp/ssh_config target "echo 'Target host connection successful for $SERVICE'" || { echo "::error::Target host connection failed for $ENVIRONMENT, $SERVICE"; cat /tmp/ssh_config; exit 1; }
          else
            ssh -vvv -F /tmp/ssh_config target "echo 'Target host connection successful for $SERVICE'" || { echo "::error::Target host connection failed for $ENVIRONMENT, $SERVICE"; cat /tmp/ssh_config; exit 1; }
          fi

      - name: Install dos2unix on target server
        if: matrix.environment == 'tn-staging'
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          ssh -F /tmp/ssh_config target "sudo apt-get update && sudo apt-get install -y dos2unix" || { echo "::warning::Failed to install dos2unix for $ENVIRONMENT, $SERVICE"; }

      - name: Create and transfer .env file
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          TARGET_DIR="${{ env.target_dir }}"
          echo "${{ secrets.ENV_FILE }}" > .env
          chmod 600 .env
          ls -l .env
          for attempt in {1..3}; do
            rsync -avz --timeout=30 -e "ssh -vvv -F /tmp/ssh_config" .env target:$TARGET_DIR/.env && break
            echo "Rsync attempt $attempt failed, retrying in 5 seconds..."
            sleep 5
          done || { echo "::error::Failed to rsync .env file for $ENVIRONMENT, $SERVICE after 3 attempts"; cat /tmp/ssh_config; exit 1; }
          ssh -F /tmp/ssh_config target "ls -l $TARGET_DIR/.env" || { echo "::error::Failed to verify .env on target server for $ENVIRONMENT, $SERVICE"; exit 1; }
          rm -f .env

      - name: Verify docker-compose.yml on server
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          TARGET_DIR="${{ env.target_dir }}"
          ssh -F /tmp/ssh_config target "cat $TARGET_DIR/docker-compose.yml" || { echo "::error::Failed to verify docker-compose.yml for $ENVIRONMENT, $SERVICE"; exit 1; }

      - name: Clean up Git working directory
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          TARGET_DIR="${{ env.target_dir }}"
          ssh -F /tmp/ssh_config target "cd $TARGET_DIR && git stash --include-untracked || true && git reset --hard || true && git clean -fd || true" || { echo "::error::Failed to clean Git working directory for $ENVIRONMENT, $SERVICE"; exit 1; }

      - name: Clean up Docker environment
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          TARGET_DIR="${{ env.target_dir }}"
          ssh -F /tmp/ssh_config target "cd $TARGET_DIR && docker-compose down --remove-orphans || true && docker rm -f $SERVICE || true && docker network rm ai-network || true && docker network create all-learner-ai-services-ai-network || true" || { echo "::error::Failed to clean Docker environment for $ENVIRONMENT, $SERVICE"; exit 1; }

      - name: Verify deploy.sh syntax
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          TARGET_DIR="${{ env.target_dir }}"
          dos2unix scripts/deploy.sh
          cat scripts/deploy.sh
          wc -l scripts/deploy.sh
          od -c scripts/deploy.sh | head -n 10
          bash -n scripts/deploy.sh || { echo "::error::Syntax error in deploy.sh locally for $ENVIRONMENT, $SERVICE"; exit 1; }
          rsync -avz --timeout=30 -e "ssh -F /tmp/ssh_config" scripts/deploy.sh target:/home/${{ env.remote_user }}/deploy.sh || { echo "::error::Failed to rsync deploy.sh for $ENVIRONMENT, $SERVICE"; exit 1; }
          ssh -F /tmp/ssh_config target "dos2unix /home/${{ env.remote_user }}/deploy.sh && cat /home/${{ env.remote_user }}/deploy.sh && wc -l /home/${{ env.remote_user }}/deploy.sh && od -c /home/${{ env.remote_user }}/deploy.sh | head -n 10 && bash -n /home/${{ env.remote_user }}/deploy.sh" || { echo "::error::Syntax error in deploy.sh on target server for $ENVIRONMENT, $SERVICE"; exit 1; }

      - name: Deploy or rollback
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          ACTION="${{ steps.vars.outputs.action }}"
          SERVICE="${{ matrix.service }}"
          TARGET_DIR="${{ env.target_dir }}"
          if [[ "$ACTION" == "deploy" ]]; then
            BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
            ssh -F /tmp/ssh_config target "chmod +x /home/${{ env.remote_user }}/deploy.sh && /home/${{ env.remote_user }}/deploy.sh $TARGET_DIR $BRANCH deploy"
          elif [[ "$ACTION" == "rollback" ]]; then
            ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo "::error::Rollback tag required for $ENVIRONMENT, $SERVICE"
              exit 1
            fi
            ssh -F /tmp/ssh_config target "chmod +x /home/${{ env.remote_user }}/deploy.sh && /home/${{ env.remote_user }}/deploy.sh $TARGET_DIR $ROLLBACK_TAG rollback"
          else
            echo "::error::Invalid action: $ACTION for $ENVIRONMENT, $SERVICE"
            exit 1
          fi

      - name: Verify container logs
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          ssh -F /tmp/ssh_config target "docker logs $SERVICE || echo 'Failed to get container logs for $ENVIRONMENT, $SERVICE'"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: 'deployments'
          text: |
            ${{ job.status == 'success' && ':white_check_mark:' || ':x:' }} Deployment ${{ job.status == 'success' && 'Succeeded' || 'Failed' }} for ${{ matrix.service }}
            *Environment:* ${{ github.event.inputs.environment }}
            *Action:* ${{ github.event.inputs.action }}
            *Ref:* ${{ github.ref_name }}
            *Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f /tmp/id_rsa /tmp/ssh_config .env /tmp/id_rsa.pub
