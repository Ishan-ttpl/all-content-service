name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, rollback]
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options: [test-rig-dev, test-rig-prod, tn-dev, tn-staging]
      branch:
        description: 'Branch to deploy (deploy only)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (rollback only)'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'tn-staging' }}
    steps:

      - name: Install SSH & rsync
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Copy deploy.sh to server
        run: |
          rsync -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            scripts/deploy.sh \
            deployment@${{ secrets.TN_STAGING_HOST }}:/home/deployment/all-services/all-content-service/scripts/deploy.sh

      - name: Execute remote deploy.sh
        env:
          DOCKER_COMPOSE_CONTENT_B64: ${{ secrets.DOCKER_COMPOSE_CONTENT_B64 }}
          ENV_FILE_B64:             ${{ secrets.ENV_FILE_B64 || '' }}
        run: |
          # Decide ref: use rollback_tag if rollback, else branch
          if [[ "${{ github.event.inputs.action }}" == "rollback" ]]; then
            REF="${{ github.event.inputs.rollback_tag }}"
          else
            REF="${{ github.event.inputs.branch }}"
          fi
          if [[ -z "$REF" ]]; then
            echo "::error::No branch or rollback_tag provided for action ${{ github.event.inputs.action }}"; exit 1
          fi

          ssh -i key.pem -o StrictHostKeyChecking=no \
            deployment@${{ secrets.TN_STAGING_HOST }} \
            "export DOCKER_COMPOSE_CONTENT_B64='${DOCKER_COMPOSE_CONTENT_B64}' \
             ENV_FILE_B64='${ENV_FILE_B64}' && \
             /home/deployment/all-services/all-content-service/scripts/deploy.sh \
               /home/deployment/all-services/all-content-service \
               \"$REF\" \
               \"${{ github.event.inputs.action }}\""

      - name: Cleanup local key
        if: always()
        run: rm -f key.pem

      - name: Notify Slack
        if: always()
        run: |
          if [[ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]]; then
            STATUS="${{ job.status }}"
            EMOJI=":x:"; [[ "$STATUS" == "success" ]] && EMOJI=":white_check_mark:"
            MSG="*All-Content-Service Deployment ${STATUS^}*  
          *Env:* ${{ github.event.inputs.environment }}  
          *Action:* ${{ github.event.inputs.action }}  
          *Ref:* ${{ github.ref_name }}  
          *Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            [[ "${{ github.event.inputs.action }}" == "rollback" && -n "${{ github.event.inputs.rollback_tag }}" ]] && \
              MSG+="\n*Rollback Tag:* ${{ github.event.inputs.rollback_tag }}"
            curl -X POST -H 'Content-Type: application/json' \
                 --data "{\"text\":\"$MSG\"}" "${{ secrets.SLACK_WEBHOOK_URL }}"
          else
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification."
          fi
