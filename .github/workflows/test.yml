name: Deploy or Rollback All-Content-Service

on:
  push:
    tags:
      - 'deploy-test-rig-dev-*'
      - 'deploy-test-rig-prod-*'
      - 'deploy-tn-dev-*'
      - 'deploy-tn-staging-*'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - test-rig-dev
          - test-rig-prod
          - tn-dev
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'tn-staging' }}

    steps:
      - name: Determine environment and action
        id: vars
        run: |
          ENVIRONMENT=""
          ACTION=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PREFIX="${GITHUB_REF#refs/tags/deploy-}"
            ENVIRONMENT="${TAG_PREFIX%%-*}"
            case "$ENVIRONMENT" in
              test-rig-dev|test-rig-prod|tn-dev|tn-staging)
                ACTION="deploy"
                ;;
              *)
                echo "::error::Invalid tag format. Expected 'deploy-<env>-*'."
                exit 1
                ;;
            esac
          else
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            ACTION="${{ github.event.inputs.action }}"
          fi
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secrets
        run: |
          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          missing_secrets=""
          invalid_hosts=""

          # Base64 decode secrets safely
          SSH_KEY=$(echo "${{ secrets.SSH_KEY }}" | base64 -d)
          ENV_FILE=$(echo "${{ secrets.ENV_FILE }}" | base64 -d)
          
          [[ -z "$SSH_KEY" ]] && missing_secrets+=" SSH_KEY"
          [[ -z "$ENV_FILE" ]] && missing_secrets+=" ENV_FILE"

          case "$ENVIRONMENT" in
            test-rig-dev)
              [[ -z "${{ secrets.TEST_RIG_DEV_HOST }}" ]] && missing_secrets+=" TEST_RIG_DEV_HOST"
              [[ "${{ secrets.TEST_RIG_DEV_HOST }}" != *"@"* ]] && invalid_hosts+=" TEST_RIG_DEV_HOST"
              ;;
            test-rig-prod)
              [[ -z "${{ secrets.TEST_RIG_PROD_HOST }}" ]] && missing_secrets+=" TEST_RIG_PROD_HOST"
              [[ "${{ secrets.TEST_RIG_PROD_HOST }}" != *"@"* ]] && invalid_hosts+=" TEST_RIG_PROD_HOST"
              ;;
            tn-dev)
              [[ -z "${{ secrets.TN_DEV_HOST }}" ]] && missing_secrets+=" TN_DEV_HOST"
              [[ "${{ secrets.TN_DEV_HOST }}" != *"@"* ]] && invalid_hosts+=" TN_DEV_HOST"
              ;;
            tn-staging)
              [[ -z "${{ secrets.TN_STAGING_HOST }}" ]] && missing_secrets+=" TN_STAGING_HOST"
              [[ -z "${{ secrets.JUMPHOST }}" ]] && missing_secrets+=" JUMPHOST"
              [[ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]] && missing_secrets+=" SLACK_WEBHOOK_URL"
              [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* ]] && invalid_hosts+=" TN_STAGING_HOST"
              [[ "${{ secrets.JUMPHOST }}" != *"@"* ]] && invalid_hosts+=" JUMPHOST"
              ;;
          esac

          if [[ -n "$missing_secrets" ]]; then
            echo "::error::Missing required secrets for $ENVIRONMENT:$missing_secrets"
            exit 1
          fi
          if [[ -n "$invalid_hosts" ]]; then
            echo "::error::Invalid host format (expected user@host) for $ENVIRONMENT:$invalid_hosts"
            exit 1
          fi

          # Store decoded secrets as environment variables
          echo "SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "$SSH_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ENV_FILE<<EOF" >> $GITHUB_ENV
          echo "$ENV_FILE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh-keygen -y -f /tmp/id_rsa > /tmp/id_rsa.pub

          ENVIRONMENT="${{ steps.vars.outputs.environment }}"
          case "$ENVIRONMENT" in
            tn-staging)
              JUMPHOST="${{ secrets.JUMPHOST }}"
              JUMPHOST_USER="${JUMPHOST%%@*}"
              JUMPHOST_HOST="${JUMPHOST##*@}"
              HOST="${{ secrets.TN_STAGING_HOST }}"
              TARGET_DIR="/home/deployment/all-services/all-content-service"
              ;;
            *)
              HOST="${{ secrets.${ENVIRONMENT//-/_}_HOST }}"
              TARGET_DIR="/home/$(cut -d@ -f1 <<<"$HOST")/all-content-service"
              ;;
          esac

          USER="${HOST%%@*}"
          HOSTNAME="${HOST##*@}"

          cat > /tmp/ssh_config <<EOF
          Host target
            HostName $HOSTNAME
            User $USER
            IdentityFile /tmp/id_rsa
            StrictHostKeyChecking no
            ServerAliveInterval 180
            ServerAliveCountMax 15
          EOF

          if [[ "$ENVIRONMENT" == "tn-staging" ]]; then
            cat >> /tmp/ssh_config <<EOF
            Host jumphost
              HostName $JUMPHOST_HOST
              User $JUMPHOST_USER
              IdentityFile /tmp/id_rsa
              StrictHostKeyChecking no
            
            Host target
              ProxyJump jumphost
            EOF
          fi

          chmod 600 /tmp/ssh_config
          echo "target_dir=$TARGET_DIR" >> $GITHUB_ENV
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts
          [[ -n "$JUMPHOST_HOST" ]] && ssh-keyscan -H $JUMPHOST_HOST >> ~/.ssh/known_hosts

      - name: Transfer files
        run: |
          # Create .env file
          echo "$ENV_FILE" > .env
          chmod 600 .env

          # Transfer files with retries
          transfer_with_retry() {
            local src=$1 dest=$2
            for attempt in {1..5}; do
              rsync -avz -e "ssh -F /tmp/ssh_config" "$src" "target:$dest" && return 0
              sleep 10
            done
            return 1
          }

          transfer_with_retry .env "$target_dir/.env" || exit 1
          transfer_with_retry deploy.sh "$target_dir/deploy.sh" || exit 1
          transfer_with_retry docker-compose.yml "$target_dir/docker-compose.yml" || exit 1

          # Verify transfers
          ssh -F /tmp/ssh_config target "
            chmod +x $target_dir/deploy.sh
            dos2unix $target_dir/{.env,deploy.sh,docker-compose.yml}
            ls -la $target_dir/{.env,deploy.sh,docker-compose.yml}
          "

      - name: Execute deployment
        run: |
          ACTION="${{ steps.vars.outputs.action }}"
          REF="${{ github.event.inputs.branch || github.event.inputs.rollback_tag || github.ref_name }}"
          
          ssh -F /tmp/ssh_config target "
            cd $target_dir
            sudo ./deploy.sh '$target_dir' '$REF' '$ACTION'
          "

      - name: Verify deployment
        run: |
          ssh -F /tmp/ssh_config target "
            docker ps -a
            docker logs content-service --tail 50
          "

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && 'SUCCESS ✅' || 'FAILURE ❌' }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"*Deployment $STATUS*\n*Environment*: ${{ steps.vars.outputs.environment }}\n*Action*: ${{ steps.vars.outputs.action }}\n*Ref*: ${{ github.ref_name }}\n*Run*: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
