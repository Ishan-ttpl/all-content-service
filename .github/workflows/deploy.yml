name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH Key and Environment Vars
        run: |
          echo "${{ secrets.SSH_KEY }}" > key_target.pem
          chmod 600 key_target.pem
          
          echo "${{ secrets.SSH_KEY }}" > key_jump.pem
          chmod 600 key_jump.pem

          echo "host=${{ secrets.TN_STAGING_HOST }}" >> "$GITHUB_ENV"
          echo "jump_host=${{ secrets.JUMPHOST }}" >> "$GITHUB_ENV"
          echo "target_dir=/home/all-staging-user/all-services/all-content-deploy" >> "$GITHUB_ENV"

      - name: Execute deploy or rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          HOST="${{ env.host }}"
          JUMP_HOST="${{ env.jump_host }}"
          TARGET_DIR="${{ env.target_dir }}"
          BRANCH="${{ github.event.inputs.branch }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"

          echo "Starting action: $ACTION"

          SSH_COMMAND="ssh -o StrictHostKeyChecking=no -i key_jump.pem -J $JUMP_HOST -i key_target.pem $HOST"

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to $HOST"
            $SSH_COMMAND << EOF
              echo "Navigating to $TARGET_DIR"
              cd "$TARGET_DIR" || { echo "Error: Directory $TARGET_DIR not found."; exit 1; }
              git fetch --all
              git checkout "$BRANCH" || { echo "Error: Branch '$BRANCH' not found."; exit 1; }
              git pull origin "$BRANCH"
              docker-compose down || echo "No containers to stop."
              docker-compose up -d --build || { echo "Docker build/start failed."; exit 1; }
              docker images --no-trunc -aqf "dangling=true" | xargs docker rmi || echo "No dangling images."
              echo "Deployment complete."
EOF

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo "::error::Rollback tag is required"
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG"
            $SSH_COMMAND << EOF
              echo "Navigating to $TARGET_DIR"
              cd "$TARGET_DIR" || { echo "Error: Directory $TARGET_DIR not found."; exit 1; }
              git fetch --all --tags
              git checkout "tags/$ROLLBACK_TAG" || { echo "Error: Tag '$ROLLBACK_TAG' not found."; exit 1; }
              docker-compose down || echo "No containers to stop."
              docker-compose up -d --build || { echo "Docker build/start failed."; exit 1; }
              docker images --no-trunc -aqf "dangling=true" | xargs docker rmi || echo "No dangling images."
              echo "Rollback complete."
EOF

          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi
