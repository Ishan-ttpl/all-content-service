name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH keys
        run: |
          # Save the private key
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          
          # Add key to SSH agent
          eval $(ssh-agent)
          ssh-add id_rsa

      - name: Configure SSH
        run: |
          # Create SSH config
          cat > ssh_config <<EOF
          Host jump
            HostName ${{ secrets.JUMPHOST_IP }}
            User ${{ secrets.JUMPHOST_USER }}
            IdentityFile id_rsa
            StrictHostKeyChecking no
            
          Host target
            HostName ${{ secrets.TARGET_HOST_IP }}
            User ${{ secrets.TARGET_USER }}
            IdentityFile id_rsa
            ProxyJump jump
            StrictHostKeyChecking no
          EOF

      - name: Test SSH connection
        run: |
          echo "Testing connection to jump host..."
          ssh -F ssh_config jump "echo 'Jump host connection successful'"
          
          echo "Testing connection to target host..."
          ssh -F ssh_config target "echo 'Target host connection successful'"

      - name: Execute deploy or rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          TARGET_DIR="/home/all-staging-user/all-services/all-content-deploy"
          BRANCH="${{ github.event.inputs.branch || 'lais-v2.0' }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"

          echo "Running action: $ACTION"

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to target server"
            ssh -F ssh_config target "cd $TARGET_DIR && \
              git fetch --all && \
              git checkout $BRANCH && \
              git pull origin $BRANCH && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true"

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo '::error::Rollback tag is required'
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on target server"
            ssh -F ssh_config target "cd $TARGET_DIR && \
              git fetch --all --tags && \
              git checkout tags/$ROLLBACK_TAG && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true"

          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi
