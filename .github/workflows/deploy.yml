name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH key
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          eval "$(ssh-agent -s)" # Start SSH agent
          ssh-add id_rsa        # Add key to agent

          mkdir -p ~/.ssh
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Execute deploy or rollback
        run: |
          set -e

          ACTION="${{ github.event.inputs.action }}"
          BRANCH_INPUT="${{ github.event.inputs.branch }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          TARGET_DIR="/home/all-staging-user/all-services/all-content-deploy"
          # IMPORTANT: Use the SSH URL for your GitHub repository
          REPO_URL="git@github.com:Ishan-ttpl/all-content-service.git"

          # Default branch
          BRANCH="${BRANCH_INPUT:-lais-v2.0}"

          # Define the SSH ProxyCommand value directly
          PROXY_CMD_VALUE="ssh -i id_rsa -W %h:%p sudeepr@4.240.49.92"

          # Construct the SSH command as an array to handle complex arguments robustly
          # Add -A for SSH agent forwarding
          SSH_COMMAND_ARRAY=(
            ssh
            -A # Enables agent forwarding for commands on the remote server
            -o "ProxyCommand=$PROXY_CMD_VALUE"
            -i id_rsa
            all-staging-user@10.3.0.9
          )

          echo "Running action: $ACTION"

          # Define the base remote command structure
          REMOTE_COMMAND=""

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to target server..."
            REMOTE_COMMAND="
              mkdir -p \"$TARGET_DIR\" && \
              cd \"$TARGET_DIR\" || { echo \"Error: Could not navigate to $TARGET_DIR\"; exit 1; } && \
              
              # Check if it's a Git repository
              if git rev-parse --is-inside-work-tree > /dev/null 2>&1; then
                echo \"Directory is a Git repository. Fetching and pulling...\"
                git fetch --all && \
                git checkout \"$BRANCH\" && \
                git pull origin \"$BRANCH\"
              else
                echo \"Directory is NOT a Git repository. Cleaning and cloning...\"
                # Clear directory contents, but only if it's not a git repo
                rm -rf \"$TARGET_DIR\"/* \"$TARGET_DIR\"/.* 2>/dev/null || true
                git clone \"$REPO_URL\" . || { echo \"Error: Failed to clone repository ($REPO_URL). Check URL and SSH key access.\"; exit 1; }
                # After cloning, ensure we are on the correct branch
                cd \"$TARGET_DIR\" && git checkout \"$BRANCH\" # cd again in case clone changed context
              fi && \
              
              echo \"Running deploy.sh...\" && \
              if [ -f \"./deploy.sh\" ]; then
                bash ./deploy.sh \"$TARGET_DIR\" \"$BRANCH\" \"$ACTION\"
              else
                echo \"Error: deploy.sh not found in $TARGET_DIR. Running basic docker commands instead.\" && \
                docker-compose down || true && \
                docker-compose up -d --build && \
                docker image prune -f || true
              fi
            "

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo '::error::Rollback tag is required'
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on target server..."
            REMOTE_COMMAND="
              cd \"$TARGET_DIR\" || { echo \"Error: Could not navigate to $TARGET_DIR\"; exit 1; } && \
              
              if ! git rev-parse --is-inside-work-tree > /dev/null 2>&1; then
                echo \"Error: Directory is not a Git repository for rollback. Cannot proceed.\"
                exit 1
              fi && \
              
              echo \"Fetching all latest changes and tags...\" && \
              git fetch --all --tags && \
              echo \"Checking out tag: $ROLLBACK_TAG...\" && \
              git checkout \"tags/$ROLLBACK_TAG\" && \
              
              echo \"Running deploy.sh after rollback...\" && \
              if [ -f \"./deploy.sh\" ]; then
                bash ./deploy.sh \"$TARGET_DIR\" \"$ROLLBACK_TAG\" \"$ACTION\"
              else
                echo \"Error: deploy.sh not found in $TARGET_DIR. Running basic docker commands instead.\" && \
                docker-compose down || true && \
                docker-compose up -d --build && \
                docker image prune -f || true
              fi
            "
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

          # Execute the constructed remote command
          "${SSH_COMMAND_ARRAY[@]}" "$REMOTE_COMMAND"
