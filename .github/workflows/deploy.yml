      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Validate secrets
        run: |
          if [[ -z "${{ secrets.SSH_KEY }}" || -z "${{ secrets.TN_STAGING_HOST }}" || -z "${{ secrets.JUMPHOST }}" || -z "${{ secrets.ENV_FILE }}" ]]; then
            echo "::error::Missing required secrets (SSH_KEY, TN_STAGING_HOST, JUMPHOST, ENV_FILE)"
            exit 1
          fi
          if [[ "${{ secrets.TN_STAGING_HOST }}" != *"@*" || "${{ secrets.JUMPHOST }}" != *"@*" ]]; then
            echo "::error::Invalid format for TN_STAGING_HOST or JUMPHOST (expected user@host)"
            exit 1
          fi

      - name: Set up SSH keys and config
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          ls -l id_rsa  # Debug: Verify file exists
          mkdir -p ~/.ssh
          echo -e "Host staging\n  HostName ${{ secrets.TN_STAGING_HOST##*@ }}\n  User ${{ secrets.TN_STAGING_HOST%%@* }}\n  IdentityFile $(pwd)/id_rsa\n  ProxyJump ${{ secrets.JUMPHOST }}\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config
          cat ~/.ssh/config  # Debug: Verify config

      - name: Test SSH connectivity
        run: |
          ssh -F ~/.ssh/config staging "echo 'SSH connection successful'" || { echo "::error::SSH connection failed"; exit 1; }

      - name: Set target directory
        run: |
          echo "target_dir=/home/all-staging-user/all-services/all-content-deploy" >> $GITHUB_ENV

      - name: Create .env file on target server
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          echo "${{ secrets.ENV_FILE }}" > .env
          chmod 600 .env
          rsync -avz -e "ssh -F ~/.ssh/config" .env staging:$TARGET_DIR/.env
          rm -f .env  # Clean up .env but keep id_rsa

      - name: Execute deploy or rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          TARGET_DIR="${{ env.target_dir }}"
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to staging"
            ssh -F ~/.ssh/config staging "cd $TARGET_DIR && \
              git fetch --all && \
              git checkout $BRANCH || git checkout lais-v2.0 && \
              git pull origin $BRANCH || git pull origin lais-v2.0 && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true && \
              rm -f .env"

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo "::error::Rollback tag is required"
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on staging"
            ssh -F ~/.ssh/config staging "cd $TARGET_DIR && \
              git fetch --all --tags && \
              git checkout tags/$ROLLBACK_TAG && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true && \
              rm -f .env"

          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f id_rsa ~/.ssh/config
