name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH keys and config
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          mkdir -p ~/.ssh
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Set target host and directory
        run: |
          echo "host=${{ secrets.TN_STAGING_HOST }}" >> $GITHUB_ENV
          echo "jump_host=${{ secrets.JUMPHOST }}" >> $GITHUB_ENV
          echo "target_dir=/home/all-staging-user/all-services/all-content-deploy" >> $GITHUB_ENV

      - name: Create .env file on target server
        run: |
          HOST="${{ env.host }}"
          JUMP_HOST="${{ env.jump_host }}"
          TARGET_DIR="${{ env.target_dir }}"
          if [[ -z "$HOST" || -z "$JUMP_HOST" ]]; then
            echo "::error::HOST or JUMP_HOST is not set"
            exit 1
          fi
          echo "${{ secrets.ENV_FILE }}" > .env
          SCP_COMMAND="scp -i id_rsa -o ProxyCommand='ssh -W %h:%p -i id_rsa $JUMP_HOST'"
          $SCP_COMMAND .env $HOST:$TARGET_DIR/.env

      - name: Execute deploy or rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          HOST="${{ env.host }}"
          JUMP_HOST="${{ env.jump_host }}"
          TARGET_DIR="${{ env.target_dir }}"
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          SSH_COMMAND="ssh -i id_rsa -o ProxyCommand='ssh -W %h:%p -i id_rsa $JUMP_HOST' $HOST"

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to $HOST"
            $SSH_COMMAND "cd $TARGET_DIR && \
              git fetch --all && \
              git checkout $BRANCH || git checkout lais-v2.0 && \
              git pull origin $BRANCH || git pull origin lais-v2.0 && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true && \
              rm -f .env"

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo "::error::Rollback tag is required"
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on $HOST"
            $SSH_COMMAND "cd $TARGET_DIR && \
              git fetch --all --tags && \
              git checkout tags/$ROLLBACK_TAG && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true && \
              rm -f .env"

          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi
