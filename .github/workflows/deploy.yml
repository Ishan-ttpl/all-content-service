name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'main'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-22.04
    environment: tn-staging

    steps:
      - name: Debug workflow dispatch inputs
        run: |
          echo "Workflow dispatch inputs:"
          echo "action: ${{ github.event.inputs.action }}"
          echo "branch: ${{ github.event.inputs.branch }}"
          echo "rollback_tag: ${{ github.event.inputs.rollback_tag }}"
          echo "environment: ${{ job.environment }}"
          echo "runner: $RUNNER_OS, $RUNNER_NAME"

      - name: Validate inputs
        run: |
          if [[ "${{ github.event.inputs.action }}" != "deploy" && "${{ github.event.inputs.action }}" != "rollback" ]]; then
            echo "::error::Invalid action: ${{ github.event.inputs.action }}"
            exit 1
          fi
          if [[ "${{ github.event.inputs.action }}" == "rollback" && -z "${{ github.event.inputs.rollback_tag }}" ]]; then
            echo "::error::Rollback tag is required for rollback action"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Validate secrets
        run: |
          if [[ -z "${{ secrets.SSH_KEY }}" || -z "${{ secrets.TN_STAGING_HOST }}" || -z "${{ secrets.JUMPHOST }}" || -z "${{ secrets.ENV_FILE }}" ]]; then
            echo "::error::Missing required secrets (SSH_KEY, TN_STAGING_HOST, JUMPHOST, ENV_FILE)"
            exit 1
          fi
          if [[ "${{ secrets.TN_STAGING_HOST }}" != *"@"* || "${{ secrets.JUMPHOST }}" != *"@"* ]]; then
            echo "::error::Invalid format for TN_STAGING_HOST or JUMPHOST (expected user@host)"
            exit 1
          fi

      - name: Set up SSH keys and config
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          ls -l id_rsa  # Debug: Verify file exists
          ssh-keygen -l -f id_rsa  # Debug: Show key fingerprint
          mkdir -p ~/.ssh
          TN_STAGING_HOST="${{ secrets.TN_STAGING_HOST }}"
          JUMPHOST="${{ secrets.JUMPHOST }}"
          HOSTNAME="${TN_STAGING_HOST##*@}"
          USER="${TN_STAGING_HOST%%@*}"
          JUMPHOST_USER="${JUMPHOST%%@*}"
          JUMPHOST_HOST="${JUMPHOST##*@}"
          echo -e "Host jumphost\n  HostName $JUMPHOST_HOST\n  User $JUMPHOST_USER\n  IdentityFile $(pwd)/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\nHost staging\n  HostName $HOSTNAME\n  User $USER\n  IdentityFile $(pwd)/id_rsa\n  ProxyJump jumphost\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config
          cat ~/.ssh/config  # Debug: Verify config

      - name: Test jump host connectivity
        run: |
          ssh -vvv -F ~/.ssh/config jumphost "echo 'Jump host connection successful'" || { echo "::error::Jump host connection failed"; exit 1; }

      - name: Test target host connectivity
        run: |
          ssh -vvv -F ~/.ssh/config staging "echo 'Target host connection successful'" || { echo "::error::Target host connection failed"; exit 1; }

      - name: Set target directory
        run: |
          echo "target_dir=/home/all-staging-user/all-services/all-content-deploy" >> $GITHUB_ENV

      - name: Create .env file on target server
        run: |
          TARGET_DIR="${{ env.target_dir }}"
          echo "${{ secrets.ENV_FILE }}" > .env
          chmod 600 .env
          rsync -avz -e "ssh -F ~/.ssh/config" .env staging:$TARGET_DIR/.env
          rm -f .env  # Clean up .env but keep id_rsa

      - name: Execute deploy or rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          TARGET_DIR="${{ env.target_dir }}"
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to staging"
            ssh -F ~/.ssh/config staging "cd $TARGET_DIR && \
              git fetch --all && \
              git checkout $BRANCH || git checkout lais-v2.0 && \
              git pull origin $BRANCH || git pull origin lais-v2.0 && \
              /bin/bash ./deploy.sh $TARGET_DIR $BRANCH deploy"
          elif [[ "$ACTION" == "rollback" ]]; then
            echo "Rolling back to tag $ROLLBACK_TAG on staging"
            ssh -F ~/.ssh/config staging "cd $TARGET_DIR && \
              git fetch --all --tags && \
              /bin/bash ./deploy.sh $TARGET_DIR $ROLLBACK_TAG rollback"
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f id_rsa ~/.ssh/config
