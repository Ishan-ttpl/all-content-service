name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH Key and Config
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null\n" > ssh_config

          echo "host=${{ secrets.TN_STAGING_HOST }}" >> "$GITHUB_ENV"
          echo "jump_host=${{ secrets.JUMPHOST }}" >> "$GITHUB_ENV"
          echo "target_dir=/home/all-staging-user/all-services/all-content-deploy" >> "$GITHUB_ENV"

      - name: Deploy or Rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          HOST="${{ env.host }}"
          JUMP_HOST="${{ env.jump_host }}"
          TARGET_DIR="${{ env.target_dir }}"
          BRANCH="${{ github.event.inputs.branch }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"

          echo "Running action: $ACTION"

          SSH_COMMAND="ssh -F ssh_config -i id_rsa -J $JUMP_HOST $HOST"

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to $HOST"
            $SSH_COMMAND "cd $TARGET_DIR && \
              git fetch --all && \
              git checkout $BRANCH && \
              git pull origin $BRANCH && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true"
          
          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z \"$ROLLBACK_TAG\" ]]; then
              echo '::error::Rollback tag is required'
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on $HOST"
            $SSH_COMMAND "cd $TARGET_DIR && \
              git fetch --all --tags && \
              git checkout tags/$ROLLBACK_TAG && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true"
          
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi
