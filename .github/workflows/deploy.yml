name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH key # Only needed for SSH connection to jump host/target, not for Git ops now
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          eval "$(ssh-agent -s)"
          ssh-add id_rsa

          mkdir -p ~/.ssh
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Execute deploy or rollback
        run: |
          set -e

          ACTION="${{ github.event.inputs.action }}"
          BRANCH_INPUT="${{ github.event.inputs.branch }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          TARGET_DIR="/home/all-staging-user/all-services/all-content-deploy"
          # Use the HTTPS URL with PAT for authentication
          REPO_URL="https://Ishan-ttpl:${{ secrets.GH_PAT }}@github.com/Ishan-ttpl/all-content-service.git"

          # Default branch
          BRANCH="${BRANCH_INPUT:-lais-v2.0}"

          # Define the SSH ProxyCommand value directly
          PROXY_CMD_VALUE="ssh -i id_rsa -W %h:%p sudeepr@4.240.49.92"

          # Construct the SSH command as an array for the remote connection
          SSH_COMMAND_ARRAY=(
            ssh
            -o "ProxyCommand=$PROXY_CMD_VALUE"
            -i id_rsa
            all-staging-user@10.3.0.9
          )

          echo "Running action: $ACTION"

          # Define the base remote command structure
          REMOTE_COMMAND=""

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to target server..."
            REMOTE_COMMAND="
              # Ensure the parent directory exists
              mkdir -p \"$(dirname "$TARGET_DIR")\" && \
              
              # Check if the TARGET_DIR exists AND is a Git repository
              if [ -d \"$TARGET_DIR\" ] && git -C \"$TARGET_DIR\" rev-parse --is-inside-work-tree > /dev/null 2>&1; then
                echo \"Directory $TARGET_DIR is an existing Git repository. Updating...\"
                cd \"$TARGET_DIR\" && \
                git fetch --all && \
                git checkout \"$BRANCH\" && \
                git pull origin \"$BRANCH\"
              elif [ -d \"$TARGET_DIR\" ]; then
                echo \"Directory $TARGET_DIR exists but is NOT a Git repository. Cleaning and cloning...\"
                # Remove existing content if it's not a valid repo
                rm -rf \"$TARGET_DIR\"/* \"$TARGET_DIR\"/.* 2>/dev/null || true
                git clone \"$REPO_URL\" \"$TARGET_DIR\" || { echo \"Error: Failed to clone repository ($REPO_URL). Check URL and PAT access.\"; exit 1; }
                cd \"$TARGET_DIR\" # cd into the newly cloned directory
              else
                echo \"Directory $TARGET_DIR does not exist. Cloning fresh...\"
                git clone \"$REPO_URL\" \"$TARGET_DIR\" || { echo \"Error: Failed to clone repository ($REPO_URL). Check URL and PAT access.\"; exit 1; }
                cd \"$TARGET_DIR\" # cd into the newly cloned directory
              fi && \
              
              # Execute deploy.sh (or fallback docker commands)
              echo \"Executing deploy.sh on the remote server...\" && \
              if [ -f \"./deploy.sh\" ]; then
                bash ./deploy.sh \"$TARGET_DIR\" \"$BRANCH\" \"$ACTION\"
              else
                echo \"Error: deploy.sh not found in $TARGET_DIR. Running basic docker commands instead.\" && \
                docker-compose down || true && \
                docker-compose up -d --build && \
                docker image prune -f || true
              fi
            "

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo '::error::Rollback tag is required'
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on target server..."
            REMOTE_COMMAND="
              # Ensure it's a Git repository before attempting rollback
              if [ -d \"$TARGET_DIR\" ] && git -C \"$TARGET_DIR\" rev-parse --is-inside-work-tree > /dev/null 2>&1; then
                echo \"Directory $TARGET_DIR is an existing Git repository. Rolling back...\"
                cd \"$TARGET_DIR\" && \
                git fetch --all --tags && \
                git checkout \"tags/$ROLLBACK_TAG\"
              else
                echo \"Error: Target directory $TARGET_DIR is not a Git repository. Cannot perform rollback.\"
                exit 1
              fi && \
              
              # Execute deploy.sh (or fallback docker commands) after rollback
              echo \"Executing deploy.sh after rollback on the remote server...\" && \
              if [ -f \"./deploy.sh\" ]; then
                bash ./deploy.sh \"$TARGET_DIR\" \"$ROLLBACK_TAG\" \"$ACTION\"
              else
                echo \"Error: deploy.sh not found in $TARGET_DIR. Running basic docker commands instead.\" && \
                docker-compose down || true && \
                docker-compose up -d --build && \
                docker image prune -f || true
              fi
            "
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

          # Execute the constructed remote command
          "${SSH_COMMAND_ARRAY[@]}" "$REMOTE_COMMAND"
