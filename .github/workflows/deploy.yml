name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH key
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          eval "$(ssh-agent -s)"
          ssh-add id_rsa

          mkdir -p ~/.ssh
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Execute deploy or rollback
        run: |
          set -e

          ACTION="${{ github.event.inputs.action }}"
          BRANCH_INPUT="${{ github.event.inputs.branch }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          TARGET_DIR="/home/all-staging-user/all-services/all-content-deploy"

          # Default branch
          BRANCH="${BRANCH_INPUT:-lais-v2.0}"

          # SSH via jump host
          SSH_COMMAND="ssh -o ProxyCommand='ssh -i id_rsa -W %h:%p sudeepr@4.240.49.92' -i id_rsa all-staging-user@10.3.0.9"

          echo "Running action: $ACTION"

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to target server..."
            $SSH_COMMAND "cd \"$TARGET_DIR\" && \
              git fetch --all && \
              git checkout \"$BRANCH\" && \
              git pull origin \"$BRANCH\" && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker image prune -f || true"

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo '::error::Rollback tag is required'
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on target server..."
            $SSH_COMMAND "cd \"$TARGET_DIR\" && \
              git fetch --all --tags && \
              git checkout \"tags/$ROLLBACK_TAG\" && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker image prune -f || true"
          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi
