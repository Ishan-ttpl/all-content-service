name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: tn-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH key and config
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa

          mkdir -p ~/.ssh
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config

          eval "$(ssh-agent -s)"
          ssh-add id_rsa

      - name: Test SSH to jump and target hosts
        run: |
          echo "Testing jump host authentication..."
          ssh -o ProxyJump=sudeepr@4.240.49.92 -i id_rsa all-staging-user@10.3.0.9 "echo 'SSH to target successful through jump host'"

      - name: Execute deploy or rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          BRANCH_INPUT="${{ github.event.inputs.branch }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          TARGET_DIR="/home/all-staging-user/all-services/all-content-deploy"

          BRANCH="${BRANCH_INPUT:-lais-v2.0}"

          echo "Running action: $ACTION"
          echo "Using branch: $BRANCH"
          echo "Using rollback tag: $ROLLBACK_TAG"

          REMOTE_CMD="cd $TARGET_DIR && "

          if [[ \"$ACTION\" == \"deploy\" ]]; then
            REMOTE_CMD+=\"git fetch --all && \
              git checkout $BRANCH && \
              git pull origin $BRANCH && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true\"

          elif [[ \"$ACTION\" == \"rollback\" ]]; then
            if [[ -z \"$ROLLBACK_TAG\" ]]; then
              echo '::error::Rollback tag is required'
              exit 1
            fi
            REMOTE_CMD+=\"git fetch --all --tags && \
              git checkout tags/$ROLLBACK_TAG && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true\"

          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi

          echo "Running remote command via jump host..."
          ssh -J sudeepr@4.240.49.92 -i id_rsa all-staging-user@10.3.0.9 "$REMOTE_CMD"
