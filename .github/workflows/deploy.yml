name: Deploy or Rollback All-Content-Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      environment:
        description: 'Target environment'
        required: true
        default: 'tn-staging'
        type: choice
        options:
          - tn-staging
          - tn-production  # Example additional environment
      branch:
        description: 'Branch to deploy (only for deploy)'
        required: false
        default: 'lais-v2.0'
      rollback_tag:
        description: 'Tag to rollback to (only for rollback)'
        required: false

jobs:
  deploy-or-rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}  # Use input environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH keys
        run: |
          echo "${{ secrets.SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          eval $(ssh-agent)
          ssh-add id_rsa
          mkdir -p ~/.ssh
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Verify key authentication on jump host
        run: |
          ssh -T sudeepr@4.240.49.92 "echo 'Jump host authentication successful!'"

      - name: Verify key authentication on target host
        run: |
          ssh -J sudeepr@4.240.49.92 all-staging-user@10.3.0.9 "echo 'Target host authentication successful!'"

      - name: Execute deploy or rollback
        run: |
          ACTION="${{ github.event.inputs.action }}"
          TARGET_DIR="/home/all-staging-user/all-services/all-content-deploy"
          BRANCH="${{ github.event.inputs.branch }}"
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"

          # Fallback to default branch if not provided for deploy
          if [ -z "$BRANCH" ] && [ "$ACTION" == "deploy" ]; then
            BRANCH="lais-v2.0"
          fi

          if [[ "$ACTION" == "deploy" ]]; then
            echo "Deploying branch $BRANCH to target server"
            REMOTE_CMD="cd '$TARGET_DIR' && \
              git fetch --all && \
              git checkout '$BRANCH' && \
              git pull origin '$BRANCH' && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true"
            
            ssh -J sudeepr@4.240.49.92 all-staging-user@10.3.0.9 "$REMOTE_CMD"

          elif [[ "$ACTION" == "rollback" ]]; then
            if [[ -z "$ROLLBACK_TAG" ]]; then
              echo '::error::Rollback tag is required'
              exit 1
            fi
            echo "Rolling back to tag $ROLLBACK_TAG on target server"
            REMOTE_CMD="cd '$TARGET_DIR' && \
              git fetch --all --tags && \
              git checkout 'tags/$ROLLBACK_TAG' && \
              docker-compose down || true && \
              docker-compose up -d --build && \
              docker images --no-trunc -aqf 'dangling=true' | xargs docker rmi || true"
            
            ssh -J sudeepr@4.240.49.92 all-staging-user@10.3.0.9 "$REMOTE_CMD"

          else
            echo "::error::Invalid action: $ACTION"
            exit 1
          fi
