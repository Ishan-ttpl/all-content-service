version: '3.8'
services:
  content-service:
    build: .
    image: all-content-service:latest
    container_name: content-service
    ports:
      - "3008:3008"
    restart: always
    env_file:
      - .env
    networks:
      # --- CHANGE THIS LINE ---
      - all-learner-ai-services_ai-network # <-- Use underscores here!

networks:
  # --- CHANGE THIS LINE ---
  all-learner-ai-services_ai-network: # <-- Use underscores here!
    driver: bridge
