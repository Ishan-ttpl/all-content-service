    image: all-content-service:latest
    container_name: content-service
    ports:
      - "3008:3008"
    restart: always
    env_file:
      - .env
    networks:
      - all-learner-ai-services_ai-network # <--- CHANGED HERE

networks:
  all-learner-ai-services_ai-network: # <--- CHANGED HERE
    driver: bridge
